// ── 본사 조직도 부서별 인원 현황 패널 ──────────────────
function HqDeptPanel({hqNodes=[]}){
  const JOB_COLORS2={"건축":"#7BA8D9","기계":"#C8874A","전기":"#E8A45A","안전":"#4AAF82",
    "품질":"#D4739A","관리":"#9B8FE8","토목":"#5BA8BE","기타":"#9AAAB8"};

  // 부서별 고정 순서
  const DEPT_ORDER=[
    "건축사업본부","건축영업실","건축공사관리담당","기전담당",
    "건축공공영업담당임원1","건축공공영업담당임원2",
    "건축민간영업담당임원1","건축민간영업담당임원2",
    "건축공사팀","건축견적팀","건축공공영업1팀","건축공공영업2팀",
    "건축민간영업1팀","건축민간영업2팀","기전팀","건축CS팀",
    "건축견적담당(공석)","건축CS담당(공석)"
  ];

  // 나이가 입력된 노드만 집계 대상
  const countableNodes=hqNodes.filter(n=>n.age&&String(n.age).trim()!==""&&String(n.age).trim()!=="0");

  // 부서별 집계 (나이 있는 노드만)
  const deptMap={};
  countableNodes.forEach(n=>{
    const dept=(n.department||n.role_group||"미분류").trim();
    if(!deptMap[dept]) deptMap[dept]={count:0,nodes:[]};
    deptMap[dept].count++;
    deptMap[dept].nodes.push(n);
  });
  // 고정 순서 우선, 나머지는 인원 많은 순
  const allDepts=Object.keys(deptMap);
  const deptEntries=[
    ...DEPT_ORDER.filter(d=>deptMap[d]),
    ...allDepts.filter(d=>!DEPT_ORDER.includes(d)).sort((a,b)=>deptMap[b].count-deptMap[a].count)
  ].map(d=>[d,deptMap[d]]);

  // 직종별 집계 (나이 있는 노드만)
  const jobMap={};
  countableNodes.forEach(n=>{
    const j=(n.job_type||"기타").trim();
    jobMap[j]=(jobMap[j]||0)+1;
  });
  const jobEntries=Object.entries(jobMap).sort((a,b)=>b[1]-a[1]);

  // 고용형태 집계 (나이 있는 노드만)
  const reg=countableNodes.filter(n=>!n.emp_type||n.emp_type==="정규직").length;
  const irr=countableNodes.filter(n=>n.emp_type==="비정규직").length;
  const total=countableNodes.length;
  if(hqNodes.length===0) return null;

  return(
    <div style={{
      width:200,flexShrink:0,
      background:"#FEFEFF",
      borderRight:"1.5px solid #EAE4F5",
      overflowY:"auto",
      display:"flex",flexDirection:"column",gap:0,
      fontSize:12,
    }}>
      {/* 헤더 */}
      <div style={{
        padding:"12px 14px 10px",
        background:"linear-gradient(135deg,#9B8FE8,#B8AEED)",
        flexShrink:0,
      }}>
        <p style={{margin:0,fontSize:10,color:"rgba(255,255,255,0.8)",fontWeight:600,letterSpacing:0.5}}>부서별 인원 현황</p>
        <p style={{margin:"3px 0 0",fontSize:22,fontWeight:800,color:"#fff",lineHeight:1}}>
          {total}<span style={{fontSize:12,fontWeight:500,marginLeft:3}}>명</span>
        </p>
        <div style={{display:"flex",gap:8,marginTop:6}}>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.85)",fontWeight:600}}>정규 {reg}</span>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.65)"}}>|</span>
          <span style={{fontSize:10,color:"rgba(255,255,255,0.85)",fontWeight:600}}>비정규 {irr}</span>
        </div>
      </div>

      {/* 부서별 */}
      <div style={{padding:"10px 12px 6px",flexShrink:0}}>
        <p style={{margin:"0 0 7px",fontSize:10,fontWeight:800,color:"#7A8CA0",
          letterSpacing:0.5,textTransform:"uppercase"}}>📂 부서별</p>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {deptEntries.map(([dept,{count,nodes}])=>{
            const repColor=JOB_COLORS2[nodes[0]?.job_type]||"#9B8FE8";
            return(
              <div key={dept} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",
                borderBottom:"1px solid #F3F0FF"}}>
                <span style={{width:7,height:7,borderRadius:2,background:repColor,
                  flexShrink:0,display:"inline-block"}}/>
                <span style={{fontSize:11,fontWeight:700,color:"#4A4570",
                  flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                  title={dept}>{dept}</span>
                <span style={{fontSize:12,fontWeight:800,color:"#9B8FE8",flexShrink:0}}>{count}명</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* 구분선 */}
      <div style={{height:1,background:"#EDE8FB",margin:"4px 12px"}}/>

      {/* 직종별 */}
      <div style={{padding:"6px 12px 10px",flexShrink:0}}>
        <p style={{margin:"0 0 7px",fontSize:10,fontWeight:800,color:"#7A8CA0",
          letterSpacing:0.5,textTransform:"uppercase"}}>🔧 직종별</p>
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          {jobEntries.map(([jt,cnt])=>{
            const col=JOB_COLORS2[jt]||"#9AAAB8";
            return(
              <div key={jt} style={{display:"flex",alignItems:"center",gap:8,
                padding:"3px 0",borderBottom:"1px solid #F3F0FF"}}>
                <span style={{fontSize:11,fontWeight:700,color:col,width:30,flexShrink:0}}>{jt}</span>
                <span style={{fontSize:12,fontWeight:800,color:"#4A4570",marginLeft:"auto"}}>{cnt}명</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}


// ── 리포트 ────────────────────────────────────────────
function PersonnelDashboard({personnel=[],orgNodes=[],sites=[],onOrgSave,onOrgDelete,onHqOrgReplaceAll,isMobile=false}){
  // ── hqNodes: org_nodes에서 site_id="__hq__" 행을 실시간으로 가져옴 ──
  const hqNodes=React.useMemo(()=>orgNodes.filter(n=>n.site_id==="__hq__"),[orgNodes]);

  const [childOrder,setChildOrder]=React.useState({});
  const [dragChild,setDragChild]=React.useState(null);
  const [dragOverChild,setDragOverChild]=React.useState(null);
  const [selectedId,setSelectedId]=React.useState(null);
  const [modalForm,setModalForm]=React.useState(null);
  const [nameSuggest,setNameSuggest]=React.useState([]);
  const [view,setView]=React.useState("dashboard");
  const [isGenerating,setIsGenerating]=React.useState(false);
  const [search,setSearch]=React.useState("");
  const [searchResult,setSearchResult]=React.useState(null);
  const [hqSearch,setHqSearch]=React.useState("");         // 본사 조직도 인원 검색어
  const [hqSearchResult,setHqSearchResult]=React.useState(null); // 검색 결과 노드 id Set
  const [licensePopup,setLicensePopup]=React.useState(null); // 자격증 보유자 팝업 {lic, holders}
  const [leavePopup,setLeavePopup]=React.useState(null); // 휴직 현황 팝업 {status, holders}
  const canvasRef=React.useRef(null);
  const isDragging=React.useRef(false);
  const dragMoved=React.useRef(false); // 드래그 이동 여부 (클릭 vs 패닝 구분)
  const dragStart=React.useRef({x:0,y:0,sl:0,st:0});

  const hqPersonnel=personnel.filter(p=>(p.dept_type||"").includes("본사"));

  // ── 집계 ──
  const total=personnel.length;
  const regular=personnel.filter(p=>p.emp_type==="정규직").length;
  const irregular=personnel.filter(p=>p.emp_type==="비정규직").length;
  const headCount=hqPersonnel.length;
  const siteCount=personnel.filter(p=>(p.dept_type||"").includes("현장")).length;

  const JT_ORDER2=["건축","기계","전기","안전","품질","관리","토목","기타"];
  const byJT={},byJTReg={},byJTIrr={};
  personnel.forEach(p=>{
    const j=(p.job_type||"기타").trim();
    byJT[j]=(byJT[j]||0)+1;
    if(p.emp_type==="비정규직") byJTIrr[j]=(byJTIrr[j]||0)+1;
    else byJTReg[j]=(byJTReg[j]||0)+1;
  });
  const jtEntries=[...JT_ORDER2.filter(j=>byJT[j]),...Object.keys(byJT).filter(j=>!JT_ORDER2.includes(j)&&byJT[j])].map(j=>[j,byJT[j]]);
  const byPos={};
  personnel.forEach(p=>{const pos=(p.position||"미지정").trim();byPos[pos]=(byPos[pos]||0)+1;});
  const posEntries=Object.entries(byPos).sort((a,b)=>positionSortKey(a[0])-positionSortKey(b[0]));

  // ── 검색 ──
  function doSearch(){
    const q=search.trim();
    if(!q){setSearchResult(null);return;}
    setSearchResult(personnel.filter(p=>(p.name||"").includes(q)||(p.emp_id||"").includes(q)||(p.department||"").includes(q)||(p.license||"").includes(q)||(p.leave_status||"").includes(q)));
  }

  // ── 본사 조직도: org_nodes 시트(site_id="__hq__")에 실시간 저장 ──
  function genHqId(){return`hq${Date.now().toString(36)}${Math.random().toString(36).slice(2,5)}`;}

  const HQ_JOB_TYPES=["건축","기계","전기","안전","품질","관리","토목","기타"];
  const HQ_POSITIONS=["전무","전문임원(사장)","전문임원(전무)","상무","상무보","부장","부장대우","차장","차장대우","과장","대리","사원","주임","반장","본부장","팀장"];

  const emptyHqForm={name:"",job_type:"관리",position:"",rank:"",emp_type:"정규직",
    department:"",age:"",phone:"",memo:"",parentId:"",isNew:true,nodeId:null};

  function openHqAdd(parentId){setSelectedId(null);setModalForm({...emptyHqForm,parentId:parentId||""});}
  function openHqEdit(n){
    setSelectedId(null);
    setModalForm({name:n.name||"",job_type:n.job_type||"관리",position:n.position||"",
      rank:n.rank||"",emp_type:n.emp_type||"정규직",department:n.department||n.role_group||"",
      age:n.age||"",phone:n.phone||"",memo:n.memo||"",
      parentId:n.parentId||"",isNew:false,nodeId:n.id});
  }
  function mfHq(k){return e=>setModalForm(f=>({...f,[k]:e.target.value}));}

  function saveHqNode(){
    if(!modalForm.name.trim()){alert("성명을 입력하세요.");return;}
    const row={
      id:modalForm.isNew?genHqId():modalForm.nodeId,

  function delHqNode(id){
    if(!window.confirm("이 노드를 삭제합니다. 하위 노드는 상위로 재연결됩니다."))return;
    const target=hqNodes.find(n=>n.id===id);
    const newParent=target?target.parentId||"":"";
    const children=hqNodes.filter(n=>n.parentId===id);
    // 로컬 state 즉시 반영 (하위 재연결 + 삭제)
    // onOrgSave가 내부적으로 setOrgNodes를 호출하므로 연속 호출해도 로컬은 즉시 반영됨
    // API 저장은 순차 처리: 재연결 먼저, 그 다음 삭제
    children.forEach(ch=>{if(onOrgSave)onOrgSave({...ch,parentId:newParent,_skipApi:false});});
    // 하위 재연결 API 완료 후 삭제 (200ms 여유)
    const delay=children.length>0?300:0;
    setTimeout(()=>{if(onOrgDelete)onOrgDelete([id]);},delay);

  }

  function handleHqNodeClick(e,id){
    e.stopPropagation();
    if(modalForm)return;
    if(dragMoved.current){dragMoved.current=false;return;} // 드래그 중엔 클릭 무시
    if(selectedId===id){ setSelectedId(null); return; }
    if(selectedId){
      const moving=hqNodes.find(n=>n.id===selectedId);
      if(!moving){setSelectedId(null);return;}
      let cur=id; const visited=new Set();
      while(cur&&cur!==""){
        if(visited.has(cur)||cur===selectedId){alert("자신의 하위로 이동할 수 없습니다.");setSelectedId(null);return;}
        visited.add(cur);
        const p=hqNodes.find(n=>n.id===cur); cur=p?p.parentId||"":"";
      }
      if(onOrgSave) onOrgSave({...moving,parentId:id,is_manual:"true"});
      setSelectedId(null);
    } else {
      setSelectedId(id);
    }
  }

  // ── 형제 드래그 순서 변경 ──
  function handleChildDragDown(e,childId,parentId){
    e.stopPropagation();e.preventDefault();
    setDragChild(childId);let cur=null;
    const siblings=hqNodes.filter(n=>n.parentId===parentId);
    function mv(ev){
      const els=document.elementsFromPoint(ev.clientX,ev.clientY);let f=null;
      for(const el of els){if(el.dataset?.hqchild&&el.dataset?.hqparent===parentId&&el.dataset.hqchild!==childId){f=el.dataset.hqchild;break;}}
      if(f!==cur){cur=f;setDragOverChild(f);}
    }
    function up(){
      document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);
      const t=cur;setDragChild(null);setDragOverChild(null);
      if(!t||t===childId)return;
      setChildOrder(prev=>{
        const sIds=siblings.map(n=>n.id);const ord=prev[parentId]||sIds;
        const base=[...ord.filter(id=>sIds.includes(id)),...sIds.filter(id=>!ord.includes(id))];
        const fi=base.indexOf(childId),ti=base.indexOf(t);if(fi<0||ti<0)return prev;
        const nx=[...base];nx.splice(fi,1);nx.splice(ti,0,childId);return {...prev,[parentId]:nx};
      });
    }
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);
  }

              canvasRef.current.scrollLeft=dragStart.current.sl-dx;
              canvasRef.current.scrollTop=dragStart.current.st-dy;

              isDragging.current=false;

              display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{fontSize:52}}>🏢</div>
              <p style={{fontSize:16,margin:0,fontWeight:700,color:"#6B7A8D"}}>본사 조직도가 비어있습니다.</p>
              <p style={{fontSize:13,margin:0,color:"#A8B5C2"}}>자동생성 또는 직접 추가하세요.</p>
              <div style={{display:"flex",gap:10,marginTop:8}}>
                <button onClick={autoGenHq} disabled={isGenerating}
                  style={{background:isGenerating?"#C4BAF0":"#9B8FE8",color:"#fff",border:"none",borderRadius:10,
                    padding:"10px 24px",fontWeight:700,fontSize:13,cursor:isGenerating?"not-allowed":"pointer"}}>
                  {isGenerating?"⏳ 저장 중...":"🔄 인원DB로 자동 생성"}
                </button>
                <button onClick={()=>openHqAdd("")}
                  style={{background:"#F1F5F9",color:"#9B8FE8",border:"1.5px solid #C8BCEC",
                    borderRadius:10,padding:"10px 24px",fontWeight:700,fontSize:13,cursor:"pointer"}}>+ 직접 추가</button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",gap:24,justifyContent:"center",alignItems:"flex-start",minWidth:"max-content"}}>
              {hqRoots.map(n=><HqNodeCard key={n.id} n={n} depth={0}/>)}
            </div>
          )}
        </div>{/* 캔버스 끝 */}
        </div>{/* 본문 flex wrapper 끝 */}
        {/* 이동 모드 안내바 */}
        {selectedId&&(
          <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",
            background:"#1A1A2E",color:"#fff",borderRadius:14,padding:"10px 22px",
            fontSize:13,fontWeight:600,boxShadow:"0 4px 28px rgba(0,0,0,0.35)",
            display:"flex",gap:14,alignItems:"center",zIndex:500,whiteSpace:"nowrap"}}>
            <span style={{color:"#86EFAC"}}>✦ 이동 모드</span>
            <span>목적지 노드를 클릭하세요</span>
            <button onClick={e=>{e.stopPropagation();
              const mv=hqNodes.find(n=>n.id===selectedId);
              if(mv&&onOrgSave)onOrgSave({...mv,parentId:"",is_manual:"true"});
              setSelectedId(null);}}
              style={{background:"#9B8FE8",border:"none",borderRadius:8,padding:"5px 14px",
                color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>최상위로</button>
            <button onClick={e=>{e.stopPropagation();setSelectedId(null);}}
              style={{background:"#7A8CA0",border:"none",borderRadius:8,padding:"5px 14px",
                color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>취소</button>
          </div>
        )}

        {/* 노드 폼 모달 */}
        {modalForm&&(
          <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.55)",zIndex:600,
            display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
            onClick={()=>{setModalForm(null);setNameSuggest([]);}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,
              width:"100%",maxWidth:420,boxShadow:"0 8px 48px rgba(0,0,0,0.22)",
              overflow:"hidden",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{height:5,background:"linear-gradient(90deg,#4338CA,#818CF8)"}}/>
              <div style={{padding:"22px 24px"}}>
                <h3 style={{margin:"0 0 18px",fontSize:16,fontWeight:800,color:"#4A4570"}}>
                  {modalForm.isNew?"+ 노드 추가":"✏ 노드 수정"}
                </h3>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  {/* 성명 + 자동완성 */}
                  <div style={{position:"relative"}}>
                    <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>성명</label>
                    <input value={modalForm.name} onChange={onNameChange}
                      placeholder="인원 DB에서 자동완성" style={inp2}/>
                    {nameSuggest.length>0&&(
                      <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",
                        border:"1.5px solid #E8E4F0",borderRadius:10,
                        boxShadow:"0 4px 20px rgba(0,0,0,0.12)",zIndex:50,
                        overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                        {nameSuggest.map(p=>(
                          <div key={p.id||p.name} onClick={()=>applyHqPersonnel(p)}
                            style={{padding:"9px 14px",cursor:"pointer",
                              borderBottom:"1px solid #F1F5F9",
                              display:"flex",alignItems:"center",gap:10}}
                            onMouseEnter={e=>e.currentTarget.style.background="#F3F0FF"}
                            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                            <span style={{fontSize:13,fontWeight:700,color:"#4A4570"}}>{p.name}</span>
                            <span style={{fontSize:11,color:"#7A8CA0",flex:1}}>
                              {[p.position,p.department].filter(Boolean).join(" · ")}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>직종</label>
                      <select value={modalForm.job_type} onChange={mfHq("job_type")} style={inp2}>
                        {HQ_JOB_TYPES.map(j=><option key={j}>{j}</option>)}
                      </select>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>직위</label>
                      <input value={modalForm.position} onChange={mfHq("position")}
                        placeholder="본부장, 팀장..." list="hq-pos-list" style={inp2}/>
                      <datalist id="hq-pos-list">{HQ_POSITIONS.map(p=><option key={p} value={p}/>)}</datalist>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>직급</label>
                      <input value={modalForm.rank} onChange={mfHq("rank")} placeholder="3급, 4급..." style={inp2}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>부서</label>
                      <input value={modalForm.department} onChange={mfHq("department")} placeholder="경영지원팀..." style={inp2}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>나이(만)</label>
                      <input type="number" value={modalForm.age} onChange={mfHq("age")} placeholder="45" style={inp2}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>연락처</label>
                      <input value={modalForm.phone} onChange={mfHq("phone")} placeholder="010-0000-0000" style={inp2}/>
                    </div>
                  </div>
                  {/* 사원구분 */}
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>사원구분</label>
                    <div style={{display:"flex",gap:7}}>
                      {["정규직","비정규직"].map(t=>(
                        <button key={t} onClick={()=>setModalForm(f=>({...f,emp_type:t}))}
                          style={{flex:1,padding:"9px",borderRadius:9,
                            border:`1.5px solid ${modalForm.emp_type===t?"#9B8FE8":"#E2E8F0"}`,
                            background:modalForm.emp_type===t?"#9B8FE8":"#fff",
                            color:modalForm.emp_type===t?"#fff":"#6B7A8D",
                            fontSize:13,fontWeight:700,cursor:"pointer"}}>{t}</button>
                      ))}
                    </div>
                  </div>
                  {/* 상위 노드 */}
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>상위 노드 (종속 관계)</label>
                    <select value={modalForm.parentId||""} onChange={mfHq("parentId")} style={inp2}>
                      <option value="">── 최상위 (없음)</option>
                      {hqNodes.filter(n=>n.id!==modalForm.nodeId)
                        .sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position))
                        .map(n=>(
                          <option key={n.id} value={n.id}>
                            {n.name} ({n.position||n.department||"−"})
                          </option>
                        ))}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#7A8CA0",display:"block",marginBottom:5}}>비고</label>
                    <input value={modalForm.memo} onChange={mfHq("memo")} placeholder="자유 메모" style={inp2}/>
                  </div>
                </div>
                <div style={{display:"flex",gap:10,marginTop:18}}>
                  <button onClick={()=>{setModalForm(null);setNameSuggest([]);}}
                    style={{flex:1,background:"#F8FAFC",border:"1.5px solid #E8E4F0",
                      borderRadius:10,padding:"12px",fontSize:13,color:"#7A8CA0",
                      cursor:"pointer",fontWeight:600}}>취소</button>
                  <button onClick={saveHqNode}
                    style={{flex:2,background:"#9B8FE8",border:"none",
                      borderRadius:10,padding:"12px",fontSize:13,color:"#fff",
                      cursor:"pointer",fontWeight:700}}>저장</button>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── 대시보드 공통 스타일 ──
  const CARD={background:"#FEFEFF",borderRadius:16,padding:"20px 22px",
    boxShadow:"0 1px 8px rgba(139,92,246,0.07)",border:"1px solid #EAE4F5"};
  const JT_COLORS2={"건축":"#7BA8D9","기계":"#C8874A","전기":"#E8A45A","안전":"#4AAF82",
    "품질":"#D4739A","관리":"#9B8FE8","토목":"#5BA8BE","기타":"#9AAAB8"};

  function Bar({pct,color,h=8}){
    return(
      <div style={{height:h,background:"#F0ECF9",borderRadius:h,overflow:"hidden",flex:1}}>
        <div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color,
          borderRadius:h,transition:"width 0.5s ease"}}/>
      </div>
    );
  }
  function SecHead({icon,label,right}){
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,
        paddingBottom:10,borderBottom:"1px solid #E8E3F5"}}>
        <span style={{fontSize:17,lineHeight:1}}>{icon}</span>
        <span style={{fontSize:15,fontWeight:800,color:"#4A4570",flex:1,letterSpacing:-0.2}}>{label}</span>
        {right&&<span style={{fontSize:13,color:"#7A8CA0",fontWeight:600,
          background:"#F8FAFC",padding:"2px 8px",borderRadius:6,border:"1px solid #E2E8F0"}}>{right}</span>}
      </div>
    );
  }

  // ── 대시보드 메인 ──
  return(
    <div style={{padding:"24px 28px 40px",background:"#F7F5FD",minHeight:"100%",overflowY:"auto"}}>

      {/* 헤더 + 검색 */}
      <div style={{display:"flex",alignItems:"center",gap:isMobile?10:16,marginBottom:isMobile?16:24,flexWrap:isMobile?"wrap":"nowrap"}}>
        <div style={{width:46,height:46,borderRadius:13,background:"linear-gradient(135deg,#9B8FE8,#B8AEED)",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>👥</div>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:11,color:"#B0A7E0",fontWeight:700,letterSpacing:1}}>PERSONNEL DASHBOARD</p>
          <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#4A4570",letterSpacing:-0.3}}>인원현황 대시보드</h2>
        </div>
        <div style={{display:"flex",gap:7,alignItems:"center",width:isMobile?"100%":"auto"}}>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&doSearch()}
            placeholder="이름 · 사번 · 부서 검색"
            style={{border:"1.5px solid #C8BCEC",borderRadius:10,padding:isMobile?"8px 12px":"10px 15px",
              fontSize:13,outline:"none",width:isMobile?"100%":205,background:"#fff",color:"#4A4570",flex:isMobile?1:"auto"}}/>
          <button onClick={doSearch}
            style={{background:"#9B8FE8",color:"#fff",border:"none",borderRadius:10,
              padding:isMobile?"8px 14px":"10px 18px",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>검색</button>
          {searchResult&&<button onClick={()=>{setSearchResult(null);setSearch("");}}
            style={{background:"#EEEBF7",color:"#6B7A8D",border:"none",borderRadius:10,
              padding:isMobile?"8px 10px":"10px 12px",fontWeight:700,fontSize:13,cursor:"pointer",flexShrink:0}}>✕</button>}
        </div>
      </div>

      {/* 검색 결과 */}
      {searchResult&&(
        <div style={{...CARD,marginBottom:20}}>
          <SecHead icon="🔍" label={`검색 결과 — "${search}"`} right={`${searchResult.length}명`}/>
          {searchResult.length===0?(
            <p style={{color:"#A8B5C2",fontSize:14,textAlign:"center",padding:"20px 0",margin:0}}>검색 결과가 없습니다.</p>
          ):(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#F8FAFC"}}>
                    {["사번","성명","부서","구분","직종","직위","직급","고용형태","나이","연락처","자격증","휴직상태"].map(h=>(
                      <th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:700,
                        color:"#374151",borderBottom:"2px solid #E2E8F0",whiteSpace:"nowrap",fontSize:12}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {searchResult.map((p,i)=>(
                    <tr key={p.id||i} style={{borderBottom:"1px solid #F1F5F9",
                      background:i%2===0?"#fff":"#F8FAFC"}}>
                      {[p.emp_id,p.name,p.department,p.dept_type,p.job_type,
                        p.position,p.rank,p.emp_type,p.age?`만 ${p.age}세`:"",p.phone,p.license,p.leave_status].map((v,j)=>(
                        <td key={j} style={{padding:"9px 12px",color:"#4A4570",whiteSpace:"nowrap",fontSize:12}}>
                          {v||<span style={{color:"#CBD5E0"}}>—</span>}
                        </td>
                      ))}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* KPI 4개 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(4,1fr)",gap:isMobile?10:14,marginBottom:isMobile?16:20}}>
        {/* 전체 인원 */}
        <div style={{...CARD,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{width:44,height:44,borderRadius:12,background:"#EDE8FB",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>👥</div>
            <div>
              <p style={{margin:0,fontSize:12,color:"#7A8CA0",fontWeight:600}}>전체 인원</p>
              <p style={{margin:"2px 0 0",fontSize:isMobile?22:28,fontWeight:800,color:"#9B8FE8",lineHeight:1}}>
                {total}<span style={{fontSize:14,fontWeight:600,marginLeft:2}}>명</span>
              </p>
            </div>
          </div>
          <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex",marginBottom:6}}>
            <div style={{width:`${total?headCount/total*100:50}%`,background:"#52B788",transition:"width 0.5s"}}/>
            <div style={{flex:1,background:"#E07070"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#52B788",fontWeight:700}}>🏢 본사 {total?Math.round(headCount/total*100):0}%</span>
            <span style={{fontSize:12,color:"#E07070",fontWeight:700}}>🏗 현장 {total?Math.round(siteCount/total*100):0}%</span>
          </div>
        </div>
        {/* 본사 인원 */}
        <div style={{...CARD,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"#DCF2E8",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏢</div>
            <div>
              <p style={{margin:0,fontSize:12,color:"#7A8CA0",fontWeight:600}}>본사 인원</p>
              <p style={{margin:"2px 0 0",fontSize:isMobile?22:28,fontWeight:800,color:"#4AAF82",lineHeight:1}}>
                {headCount}<span style={{fontSize:14,fontWeight:600,marginLeft:2}}>명</span>
              </p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <Bar pct={total?headCount/total*100:0} color="#52B788"/>
            <span style={{fontSize:14,fontWeight:800,color:"#4AAF82",minWidth:36,textAlign:"right"}}>
              {total?Math.round(headCount/total*100):0}%
            </span>
          </div>
        </div>
        {/* 현장 인원 */}
        <div style={{...CARD,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
            <div style={{width:44,height:44,borderRadius:12,background:"#FAE0E0",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🏗</div>
            <div>
              <p style={{margin:0,fontSize:12,color:"#7A8CA0",fontWeight:600}}>현장 인원</p>
              <p style={{margin:"2px 0 0",fontSize:isMobile?22:28,fontWeight:800,color:"#D4818A",lineHeight:1}}>
                {siteCount}<span style={{fontSize:14,fontWeight:600,marginLeft:2}}>명</span>
              </p>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <Bar pct={total?siteCount/total*100:0} color="#E07070"/>
            <span style={{fontSize:14,fontWeight:800,color:"#D4818A",minWidth:36,textAlign:"right"}}>
              {total?Math.round(siteCount/total*100):0}%
            </span>
          </div>
        </div>
        {/* 정규직 비율 */}
        <div style={{...CARD,padding:"18px 20px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
            <div style={{width:44,height:44,borderRadius:12,background:"#ECFDF5",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>✅</div>
            <div>
              <p style={{margin:0,fontSize:12,color:"#7A8CA0",fontWeight:600}}>정규직 비율</p>
              <p style={{margin:"2px 0 0",fontSize:isMobile?22:28,fontWeight:800,color:"#4AAF82",lineHeight:1}}>
                {total?Math.round(regular/total*100):0}<span style={{fontSize:14,fontWeight:600}}>%</span>
              </p>
            </div>
          </div>
          <div style={{height:8,borderRadius:4,overflow:"hidden",display:"flex",marginBottom:6}}>
            <div style={{width:`${total?regular/total*100:50}%`,background:"#52B788",transition:"width 0.5s"}}/>
            <div style={{flex:1,background:"#E8A45A"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{fontSize:12,color:"#52B788",fontWeight:700}}>정규직 {regular}명</span>
            <span style={{fontSize:12,color:"#E8A45A",fontWeight:700}}>비정규직 {irregular}명</span>
          </div>
        </div>
      </div>

      {/* 3단 그리드 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1.15fr 1fr 0.85fr",gap:isMobile?12:16,alignItems:"stretch"}}>

        {/* 직종별 */}
        <div style={{...CARD,display:"flex",flexDirection:"column"}}>
          <SecHead icon="🔧" label="직종별 인원" right={`총 ${total}명`}/>
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            {jtEntries.map(([jt,cnt])=>{
              const pct=total?Math.round(cnt/total*100):0;
              const col=JT_COLORS2[jt]||"#7A8CA0";
              const reg=byJTReg[jt]||0,irr=byJTIrr[jt]||0;
              const regPct=cnt?Math.round(reg/cnt*100):0;
              const irrPct=cnt?100-regPct:0;
              return(
                <div key={jt}>
                  <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:5}}>
                    <span style={{width:10,height:10,borderRadius:3,background:col,flexShrink:0}}/>
                    <span style={{fontSize:13,fontWeight:700,color:"#4A4570",flex:1}}>{jt}</span>
                    <span style={{fontSize:14,fontWeight:800,color:"#4A4570"}}>{cnt}<span style={{fontSize:11,fontWeight:500,color:"#7A8CA0",marginLeft:1}}>명</span></span>
                    <span style={{fontSize:12,color:"#A8B5C2",minWidth:30,textAlign:"right"}}>{pct}%</span>
                  </div>
                  <div style={{display:"flex",gap:1,height:7,borderRadius:4,overflow:"hidden",marginBottom:4}}>
                    <div style={{width:`${regPct}%`,background:col,transition:"width 0.5s"}}/>
                    <div style={{flex:1,background:col+"33"}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",paddingLeft:19}}>
                    <span style={{fontSize:11,color:"#6B7A8D",fontWeight:600}}>정규 {reg}명
                      <span style={{color:"#A8B5C2",fontWeight:400}}> {regPct}%</span>
                    </span>
                    {irr>0&&<span style={{fontSize:11,color:"#C8874A",fontWeight:700}}>비정규 {irr}명 {irrPct}%</span>}
                  </div>
                </div>
              );
            })}

function Reports({schedules,tasks}){
  const total=tasks.length;
  const donePct=total?Math.round(tasks.filter(t=>t.status==="완료").length/total*100):0;
  const avgProg=total?Math.round(tasks.reduce((a,t)=>a+Number(t.progress),0)/total):0;
  const pc={high:0,medium:0,low:0};
  schedules.forEach(s=>{if(pc[s.priority]!==undefined)pc[s.priority]++;});
  return <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
    <SecCard title="일정 우선순위 분포" accent="#6C63FF">{Object.entries(pc).map(([p,c])=>{const col=PRIORITY_COLORS[p];const pct=schedules.length?Math.round(c/schedules.length*100):0;return <div key={p} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:col.bg,fontWeight:600}}>{p==="high"?"높음":p==="medium"?"중간":"낮음"}</span><span style={{fontSize:12,color:"#718096"}}>{c}개 ({pct}%)</span></div><div style={{height:8,background:"#CBD5E0",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:col.bg,borderRadius:4}}/></div></div>;})}</SecCard>
    <SecCard title="업무 완료율" accent="#4ADE80">
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:140}}>
        <div style={{position:"relative",width:130,height:130}}>
          <svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="55" fill="none" stroke="#CBD5E0" strokeWidth="12"/><circle cx="65" cy="65" r="55" fill="none" stroke="#4ADE80" strokeWidth="12" strokeDasharray={`${2*Math.PI*55*donePct/100} ${2*Math.PI*55}`} strokeLinecap="round" transform="rotate(-90 65 65)"/></svg>
          <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:26,fontWeight:800,color:"#4ADE80"}}>{donePct}%</span><span style={{fontSize:11,color:"#718096"}}>완료</span></div>
        </div>
      </div>
      <p style={{textAlign:"center",color:"#4A5568",fontSize:13,margin:0}}>평균 진행률: <strong style={{color:"#2D3748"}}>{avgProg}%</strong></p>
    </SecCard>
    <SecCard title="업무 현황 요약" accent="#F9A8D4">{TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const c=STATUS_COLORS[st];return <div key={st} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:c.text}}>{st}</span><span style={{fontSize:13,fontWeight:700}}>{count}개</span></div>;})}</SecCard>
    <SecCard title="전체 통계" accent="#FB923C">{[["총 일정",schedules.length,"#6C63FF"],["총 업무",tasks.length,"#2EC4B6"],["완료된 업무",tasks.filter(t=>t.status==="완료").length,"#4ADE80"],["고우선 일정",pc.high,"#FF4D6D"]].map(([l,v,c])=><div key={l} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><span style={{fontSize:13,color:"#4A5568"}}>{l}</span><span style={{fontSize:16,fontWeight:800,color:c}}>{v}</span></div>)}</SecCard>
  </div>;
}

function ModalWrap({title,children,onClose,onSave}){
  const mobileModal=window.innerWidth<=767;
  return <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:mobileModal?"flex-end":"center",justifyContent:"center",zIndex:100,padding:mobileModal?0:20}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div style={{background:"#FFFFFF",border:"1px solid #CBD5E0",borderRadius:mobileModal?"20px 20px 0 0":16,width:"100%",maxWidth:mobileModal?"100%":480,padding:mobileModal?"20px 16px 32px":"24px 28px",maxHeight:mobileModal?"92vh":"90vh",overflow:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#6C63FF"}}>{title}</h2>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#718096",cursor:"pointer",fontSize:22}}>×</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>{children}</div>
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
        <button onClick={onClose} style={btn("#CBD5E0","#4A5568")}>취소</button>
        <button onClick={onSave} style={btn("#6C63FF")}>저장</button>
      </div>
    </div>
  </div>;
}
function Fld({label,children}){return <div><label style={{display:"block",fontSize:12,fontWeight:600,color:"#4A5568",marginBottom:6}}>{label}</label>{children}</div>;}

function SchedModal({initial,onSave,onClose,isEdit,modalTitle}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const typeLabel=modalTitle||"일정";
  const isTrip=modalTitle==="출장일정";
  const selPc=PART_COLORS[f.part];
  return <ModalWrap title={isEdit?`${typeLabel} 수정`:`새 ${typeLabel} 추가`} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="일정 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="일정 제목을 입력하세요" style={inp}/></Fld>
    <Fld label="설명"><textarea value={f.description||""} onChange={e=>s("description",e.target.value)} rows={3} placeholder="일정 설명 (선택)" style={{...inp,resize:"vertical"}}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="이메일 (알림 수신용)"><input type="email" value={f.owner_email||""} onChange={e=>s("owner_email",e.target.value)} placeholder="example@email.com" style={inp}/></Fld>
    </div>
    {isTrip&&<Fld label="파트">
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {TRIP_PARTS.map(p=>{const pc=PART_COLORS[p];const sel=f.part===p;return <button key={p} type="button" onClick={()=>s("part",sel?"":p)}
          style={{padding:"6px 14px",borderRadius:20,border:`2px solid ${sel?pc.badge:pc.border}`,background:sel?pc.badge:pc.bg,color:sel?"#fff":pc.text,fontWeight:700,fontSize:12,cursor:"pointer",transition:"all 0.15s"}}>{p}</button>;})}
      </div>
      {f.part&&selPc&&<div style={{marginTop:8,display:"inline-flex",alignItems:"center",gap:6,background:selPc.bg,border:`1px solid ${selPc.border}`,borderRadius:8,padding:"4px 12px"}}>
        <span style={{width:8,height:8,borderRadius:"50%",background:selPc.badge,display:"inline-block"}}/>
        <span style={{fontSize:12,color:selPc.text,fontWeight:700}}>{f.part} 선택됨</span>
      </div>}
    </Fld>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="시작 시간"><input type="time" value={f.start_time||""} onChange={e=>s("start_time",e.target.value)} style={inp}/></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="종료일"><input type="date" value={f.end_date||""} onChange={e=>s("end_date",e.target.value)} style={inp}/></Fld>
      <Fld label="종료 시간"><input type="time" value={f.end_time||""} onChange={e=>s("end_time",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label="중요도"><select value={f.priority||"medium"} onChange={e=>s("priority",e.target.value)} style={inp}><option value="high">높음</option><option value="medium">중간</option><option value="low">낮음</option></select></Fld>
  </ModalWrap>;
}

function TaskModal_({initial,onSave,onClose,isEdit}){
  const [f,setF]=useState({...initial});
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  return <ModalWrap title={isEdit?"업무 수정":"새 업무 추가"} onClose={onClose} onSave={()=>{if(!f.title?.trim()||!f.owner_name?.trim()){alert("제목과 담당자를 입력하세요.");return;}onSave(f);}}>
    <Fld label="업무 제목 *"><input value={f.title||""} onChange={e=>s("title",e.target.value)} placeholder="업무 제목을 입력하세요" style={inp}/></Fld>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="담당자 이름 *"><input value={f.owner_name||""} onChange={e=>s("owner_name",e.target.value)} placeholder="담당자 이름" style={inp}/></Fld>
      <Fld label="파트"><select value={f.part||""} onChange={e=>s("part",e.target.value)} style={inp}><option value="">파트 선택</option>{PARTS.map(p=><option key={p} value={p}>{p}</option>)}</select></Fld>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Fld label="시작일"><input type="date" value={f.start_date||""} onChange={e=>{const v=e.target.value;setF(p=>({...p,start_date:v,end_date:(!p.end_date||v>p.end_date)?v:p.end_date}));}} style={inp}/></Fld>
      <Fld label="완료 예정일"><input type="date" value={f.due_date||""} onChange={e=>s("due_date",e.target.value)} style={inp}/></Fld>
    </div>
    <Fld label={`진행률: ${f.progress||0}%`}><input type="range" min={0} max={100} value={f.progress||0} onChange={e=>s("progress",Number(e.target.value))} style={{width:"100%",accentColor:"#6C63FF"}}/></Fld>
    <Fld label="상태"><select value={f.status||"할 일"} onChange={e=>s("status",e.target.value)} style={inp}>{TASK_STATUSES.map(x=><option key={x} value={x}>{x}</option>)}</select></Fld>
  </ModalWrap>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('service-worker.js')
        .then(r=>console.log('SW 등록 완료:', r.scope))
        .catch(e=>console.log('SW 등록 실패:', e));
    });
  }
</script>
</body>
