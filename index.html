        {filtered.length===0&&<p style={{textAlign:"center",color:"#A0AEC0",fontSize:13,marginTop:24,padding:"0 22px"}}>등록된 인원이 없습니다.</p>}
        {filtered.map(p=>{
          const isRegular=!p.emp_type||p.emp_type==="정규직";
          const jc=getGroupColor(mapJobTypeToRoleGroup(p.job_type,p.position));
          return <div key={p.id} style={{padding:"7px 22px",borderBottom:"1px solid #EEF2F7",display:"grid",gridTemplateColumns:"80px 90px 100px 80px 80px 70px 70px 60px 80px 70px 80px 120px 90px 90px 90px 80px",gap:6,alignItems:"center",background:"#fff"}}
            onMouseEnter={e=>e.currentTarget.style.background="#F8F7FF"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <span style={{fontSize:11,color:"#718096"}}>{p.emp_id||"-"}</span>
            <span style={{fontSize:13,fontWeight:800,color:"#1A1A2E"}}>{p.name}</span>
            <span style={{fontSize:11,color:"#4A5568",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.department||"-"}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:p.dept_type==="본사"?"#EDE9FE":"#DCFCE7",color:p.dept_type==="본사"?"#6C63FF":"#15803D",fontWeight:700}}>{p.dept_type||"현장"}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:isRegular?"#EEF2FF":"#FEF3C7",color:isRegular?"#4338CA":"#92400E",fontWeight:700}}>{p.emp_type||"정규직"}</span>
            <span style={{fontSize:11,color:"#2D3748",fontWeight:600}}>{p.position||"-"}</span>
            <span style={{fontSize:11,color:"#718096"}}>{p.rank||"-"}</span>
            <span style={{fontSize:10,padding:"1px 6px",borderRadius:5,background:jc+"22",color:jc,fontWeight:700}}>{p.job_type||"-"}</span>
            <span style={{fontSize:10,color:"#718096"}}>{p.hire_date||"-"}</span>
            <span style={{fontSize:11,color:"#718096"}}>{p.age?"만 "+p.age:"−"}</span>
            <span style={{fontSize:10,color:"#718096"}}>{p.phone||"-"}</span>
            <span style={{fontSize:10,color:"#4A90E2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.license||""}>{p.license||"-"}</span>
            <span style={{fontSize:10,color:p.leave_status?"#F87171":"#A0AEC0",fontWeight:p.leave_status?700:400,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.leave_status||"-"}</span>
            <span style={{fontSize:10,color:"#718096"}}>{p.leave_start||"-"}</span>
            <span style={{fontSize:10,color:"#718096"}}>{p.leave_end||"-"}</span>
            <div style={{display:"flex",gap:3}}>
              <button onClick={()=>startEdit(p)} style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#EEF2F7",color:"#6C63FF",border:"none",cursor:"pointer",fontWeight:700}}>수정</button>
              <button onClick={()=>onDelete(p.id)} style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:"#FFF5F5",color:"#F87171",border:"none",cursor:"pointer",fontWeight:700}}>삭제</button>
            </div>
          </div>;
        })}
      </div>
    </div>
  </div>;
}

function OrgChartModal({site,onClose,orgNodes=[],onOrgSave,onOrgDelete,onOrgSaveBump,onOrgReplaceForSite,
  personnel=[],onPersonnelSave,onPersonnelDelete,siteMinStaff=[],onMinStaffSave,isAdmin=false}){

  // ── 이 현장 실제 인원 노드만 (중복 제거, 가상 그룹 노드 제거) ──
  const nodes=React.useMemo(()=>
    orgNodes.filter((n,i,arr)=>
      n.site_id===site.id &&
      n.role_group!=="__job_type__" && n.role_group!=="__role_group__" &&
      arr.findIndex(x=>x.id===n.id)===i
    )
  ,[orgNodes,site.id]);
  // nodesRef: 클로저 안에서도 항상 최신 nodes 참조
  const nodesRef=useRef(nodes);
  useEffect(()=>{nodesRef.current=nodes;},[nodes]);

  // 최소인원
  const minStaffMap=React.useMemo(()=>{
    const m={};
    siteMinStaff.filter(s=>s.site_id===site.id).forEach(s=>{m[s.role_group]=parseInt(s.min_count)||0;});
    return m;
  },[siteMinStaff,site.id]);

  // ── Refs ──
  const canvasRef=useRef(null);
  const isDragging=useRef(false);
  const dragStart=useRef({x:0,y:0,sl:0,st:0});
  const genLock=useRef(false); // 자동생성 중복 실행 방지

  // ── State ──
  const [modalForm,setModalForm]=useState(null);
  const [selectedId,setSelectedId]=useState(null);
  const [sectionOrder,setSectionOrder]=useState([]); // 직종 순서 (sort_order로 초기화)
  const [dragSec,setDragSec]=useState(null);
  const [dragOverSec,setDragOverSec]=useState(null);
  const [rgOrder,setRgOrder]=useState({});
  const [dragRg,setDragRg]=useState(null);
  const [dragOverRg,setDragOverRg]=useState(null);
  const [childOrder,setChildOrder]=useState({}); // 형제 노드 순서: {parentId: [nodeId,...]}

  // nodes 로드 시 sort_order 필드에서 순서 복원 (최초 1회만)
  const isOrderDragging=useRef(false); // 드래그 중에는 복원 차단
  const orderRestored=useRef(false); // 최초 복원 완료 여부
  useEffect(()=>{
    if(nodes.length===0)return;
    // 드래그 중이면 복원 차단
    if(isOrderDragging.current)return;
    // 이미 로컬에서 순서를 설정한 경우 덮어쓰지 않음
    // (드래그로 변경한 순서가 폴링으로 초기화되는 것 방지)
    if(orderRestored.current)return;
    const hasSortOrder=nodes.some(n=>n.sort_order&&String(n.sort_order).trim()!=="");
    if(!hasSortOrder)return;
    // ── 직종(sectionOrder) 복원 ──
    const jtOrderMap={};
    nodes.forEach(n=>{
      const jt=n.job_type||"기타";
      const so=parseInt(String(n.sort_order||"").split("_")[0]);
      if(!isNaN(so)&&(jtOrderMap[jt]===undefined||so<jtOrderMap[jt])) jtOrderMap[jt]=so;
    });
    const sortedJTs=Object.keys(jtOrderMap).sort((a,b)=>jtOrderMap[a]-jtOrderMap[b]);
    if(sortedJTs.length>0) setSectionOrder(sortedJTs);
    // ── 직군(rgOrder) 복원 ──
    const rgOrderMap={};
    nodes.forEach(n=>{
      const jt=n.job_type||"기타", rg=n.role_group||"기타";
      if(!rgOrderMap[jt]) rgOrderMap[jt]={};
      const so=parseInt(String(n.sort_order||"").split("_")[1]);
      if(!isNaN(so)&&(rgOrderMap[jt][rg]===undefined||so<rgOrderMap[jt][rg])) rgOrderMap[jt][rg]=so;
    });
    const newRgOrder={};
    Object.keys(rgOrderMap).forEach(jt=>{
      newRgOrder[jt]=Object.keys(rgOrderMap[jt]).sort((a,b)=>rgOrderMap[jt][a]-rgOrderMap[jt][b]);
    });
    setRgOrder(newRgOrder);
    // ── 형제(childOrder) 복원 ──
    const childMap={};
    nodes.forEach(n=>{
      const pid=n.parentId||"__root__";
      if(!childMap[pid]) childMap[pid]=[];
      childMap[pid].push(n);
    });
    const newChildOrder={};
    Object.keys(childMap).forEach(pid=>{
      if(pid==="__root__")return;
      const arr=childMap[pid];
      const withOrder=arr.filter(n=>n.sort_order&&!isNaN(parseInt(String(n.sort_order).split("_")[2])));
      if(withOrder.length===0)return;
      const sorted=[...arr].sort((a,b)=>{
        const sa=isNaN(parseInt(String(a.sort_order||"").split("_")[2]))?999:parseInt(String(a.sort_order).split("_")[2]);
        const sb=isNaN(parseInt(String(b.sort_order||"").split("_")[2]))?999:parseInt(String(b.sort_order).split("_")[2]);
        return sa-sb;
      });
      newChildOrder[pid]=sorted.map(n=>n.id);
    });
    setChildOrder(newChildOrder);
    // 최초 복원 완료 표시
    orderRestored.current=true;
  },[nodes]);

  // 순서를 서버에 저장하는 헬퍼: 영향받은 노드들에 sort_order 값 부여 후 upsert
  // BLOCK 없이 API만 호출 (순서 저장은 폴링 차단 불필요)
  function saveNodeOrders(updatedNodes){
    updatedNodes.forEach(n=>{ onOrgSave({...n,_skipApi:false}); });
  }
  // sort_order 전용 저장: BLOCK 없이 API만 직접 호출
  function saveSortOrder(nodesWithOrder){
    if(!nodesWithOrder||nodesWithOrder.length===0)return;
    // 드래그로 변경한 순서는 이미 로컬 state(sectionOrder/rgOrder/childOrder)에 반영됨
    // orderRestored=true 유지 → 폴링이 와도 useEffect가 덮어쓰지 않음
    orderRestored.current=true;
    // API 저장만 수행 (_skipBlock + _skipPending으로 BLOCK/30초보호 없음)
    nodesWithOrder.forEach(row=>{
      onOrgSave({...row,_skipBlock:true,_skipPending:true});
    });
  }
  const [dragChild,setDragChild]=useState(null); // 드래그 중인 노드 ID
  const [dragOverChild,setDragOverChild]=useState(null); // 드롭 대상 노드 ID
  const [showPersonnelMgr,setShowPersonnelMgr]=useState(false);
  const [showAdminPw,setShowAdminPw]=useState(false);
  const [adminPwInput,setAdminPwInput]=useState("");
  const [adminPwError,setAdminPwError]=useState("");
  const [showStats,setShowStats]=useState(true);
  const [showMinStaffEditor,setShowMinStaffEditor]=useState(false);
  const [autoGenConfirm,setAutoGenConfirm]=useState(false);
  const [nameSuggest,setNameSuggest]=useState([]);
  const [genStatus,setGenStatus]=useState(""); // 자동생성 상태 표시

  // ── 집계 ──
  const byGroup=React.useMemo(()=>{
    const m={};
    ORG_GROUPS.forEach(g=>{m[g.label]=0;});
    nodes.forEach(n=>{const g=n.role_group||"기타";m[g]=(m[g]||0)+1;});
    return m;
  },[nodes]);

  const shortages=ORG_GROUPS.filter(g=>(minStaffMap[g.label]||0)>0&&byGroup[g.label]<(minStaffMap[g.label]||0))
    .map(g=>({group:g.label,color:g.color,current:byGroup[g.label],min:minStaffMap[g.label]}));

  // ── ID 생성 (충돌 없는 고유값) ──
  function genId(){return`org${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;}

  // ── 자동완성 ──
  function onNameChange(e){
    const v=e.target.value;
    setModalForm(f=>({...f,name:v}));
    if(!v.trim()){setNameSuggest([]);return;}
    setNameSuggest(personnel.filter(p=>p.name&&p.name.includes(v.trim())).slice(0,6));
  }
  function applyPersonnel(p){
    const rg=mapJobTypeToRoleGroup(p.job_type,p.position);
    setModalForm(f=>({...f,
      emp_id:p.emp_id||"", name:p.name,
      job_type:p.job_type||f.job_type, role_group:rg,
      position:p.position||f.position, rank:p.rank||f.rank,
      emp_type:p.emp_type||"정규직", age:p.age||f.age, phone:p.phone||f.phone,
    }));
    setNameSuggest([]);
  }

  // ── 노드 저장 (단건) ──
  const emptyForm={emp_id:"",job_type:"건축",role_group:"공사",position:"",rank:"",
    emp_type:"정규직",name:"",age:"",phone:"",memo:"",parentId:"",isNew:true,nodeId:null};

  function openAdd(parentId){setSelectedId(null);setModalForm({...emptyForm,parentId:parentId||""});}
  function openEdit(n){
    setSelectedId(null);
    setModalForm({
      emp_id:n.emp_id||"", job_type:n.job_type||"건축",
      role_group:n.role_group||mapJobTypeToRoleGroup(n.job_type||"건축",n.position||""),
      position:n.position||"", rank:n.rank||"",
      emp_type:n.emp_type||"정규직", name:n.name||"",
      age:n.age||"", phone:n.phone||"", memo:n.memo||"",
      parentId:n.parentId||"", isNew:false, nodeId:n.id
    });
  }
  function mf(k){return e=>setModalForm(f=>({...f,[k]:e.target.value}));}

  function saveNode(){
    if(!modalForm.name.trim()){alert("성명을 입력하세요.");return;}
    const rg=modalForm.role_group||mapJobTypeToRoleGroup(modalForm.job_type,modalForm.position);
    const row={
      id:modalForm.isNew?genId():modalForm.nodeId,
      site_id:site.id, emp_id:modalForm.emp_id||"",
      job_type:modalForm.job_type, role_group:rg,
      position:modalForm.position, rank:modalForm.rank,
      emp_type:modalForm.emp_type, name:modalForm.name,
      age:modalForm.age, phone:modalForm.phone,
      color:getGroupColor(rg), parentId:modalForm.parentId||"",
      memo:modalForm.memo||"", is_manual:"true"
    };
    if(!modalForm.isNew){
      const existing=nodes.find(n=>n.id===modalForm.nodeId)||{};
      Object.assign(row,{...existing,...row});
    }
    onOrgSave(row);
    setNameSuggest([]);
    setModalForm(null);
  }

  // ── 노드 삭제 ──
  function delNode(id){
    if(!window.confirm("이 노드를 삭제합니다. 하위 노드는 상위로 재연결됩니다."))return;
    const target=nodes.find(n=>n.id===id);
    const newParent=target?target.parentId||"":"";
    // 먼저 하위 노드 재연결 저장
    const children=nodes.filter(n=>n.parentId===id);
    children.forEach(child=>onOrgSave({...child,parentId:newParent}));
    // 약간 지연 후 삭제 (재연결 저장 후)
    setTimeout(()=>onOrgDelete([id]),children.length*50+100);
    
  }

  // ── 노드 클릭: 선택 → 이동 ──
  // 1) 노드 클릭 → 선택(파란 테두리)
  // 2) 다른 노드 클릭 → 선택된 노드를 클릭된 노드의 하위로 이동
  // 3) 같은 노드 다시 클릭 → 선택 해제
  function handleNodeClick(e,id){
    e.stopPropagation();
    if(modalForm)return;
    if(selectedId===id){
      setSelectedId(null);
      return;
    }
    if(selectedId){
      // 이동 실행
      const moving=nodes.find(n=>n.id===selectedId);
      if(!moving){setSelectedId(null);return;}
      // 순환참조 방지
      let cur=id; const visited=new Set();
      while(cur&&cur!==""){
        if(visited.has(cur)||cur===selectedId){
          alert("자신의 하위로 이동할 수 없습니다.");
          setSelectedId(null);return;
        }
        visited.add(cur);
        const p=nodes.find(n=>n.id===cur);
        cur=p?p.parentId||"":"";
      }
      onOrgSave({...moving,parentId:id,is_manual:"true"});
      setSelectedId(null);
    } else {
      setSelectedId(id);
    }
  }

  // ── 자동 생성 (replace_all 단일 호출) ──
  async function autoGenerateOrg(){
    if(genLock.current){alert("생성 중입니다. 잠시 기다려주세요.");return;}
    genLock.current=true;
    setGenStatus("생성 중...");
    setAutoGenConfirm(false);
    try{
      const siteName=(site.name||"").trim();
      const matched=personnel.filter(p=>(p.department||"").trim()===siteName);
      if(matched.length===0){
        alert(`"${siteName}" 현장에 배치된 인원이 없습니다.
인원 관리(🔐)에서 부서명을 현장명과 동일하게 입력하세요.`);
        return;
      }
      const seen=new Set();
      const deduped=matched.filter(p=>{
        const key=(p.emp_id&&p.emp_id.trim())?p.emp_id.trim():p.name.trim();
        if(seen.has(key))return false; seen.add(key);return true;
      });
      const JT_ORDER=["건축","기계","전기","안전","품질","관리","토목","기타"];
      const newNodes=[];
      function mkNode(p){
        const rg=mapJobTypeToRoleGroup(p.job_type,p.position);
        return {id:genId(),site_id:site.id,emp_id:(p.emp_id||"").trim(),
          job_type:(p.job_type||"기타").trim(),role_group:rg,
          position:(p.position||"").trim(),rank:(p.rank||"").trim(),
          emp_type:(p.emp_type||"정규직").trim(),name:(p.name||"").trim(),
          age:(p.age||"").toString().trim(),phone:(p.phone||"").toString().trim(),
          color:getGroupColor(rg),parentId:"",memo:"",is_manual:"false"};
      }
      deduped.filter(p=>(p.position||"").trim()==="현장소장").forEach(p=>newNodes.push(mkNode(p)));
      const nonMgr=deduped.filter(p=>(p.position||"").trim()!=="현장소장");
      const byJT={};
      nonMgr.forEach(p=>{const jt=(p.job_type||"기타").trim();(byJT[jt]=byJT[jt]||[]).push(p);});
      [...new Set([...JT_ORDER,...Object.keys(byJT)])].filter(jt=>byJT[jt]).forEach(jt=>{
        const byRG={};
        byJT[jt].forEach(p=>{const rg=mapJobTypeToRoleGroup(p.job_type,p.position);(byRG[rg]=byRG[rg]||[]).push(p);});
        Object.values(byRG).forEach(arr=>{
          [...arr].sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position)).forEach(p=>newNodes.push(mkNode(p)));
        });
      });
      setGenStatus("서버 저장 중...");
      // replace_all 단일 호출 (기존 현장 삭제 + 새 노드 삽입 원자적 처리)
      if(onOrgReplaceForSite) await onOrgReplaceForSite(site.id, newNodes);
      setGenStatus("");
      alert(`✅ 자동 생성 완료!
총 ${newNodes.length}명 배치`);
    }catch(err){
      console.error("자동생성 오류:",err);
      alert("자동 생성 오류: "+err.message);
      setGenStatus("");
    }finally{
      genLock.current=false;
    }
  }

    // 같은 직군 하위만 (다른 직군 하위는 해당 섹션에서 별도 표시)
    const rawChildren=nodes.filter(ch=>ch.parentId===n.id); // 직종 무관 모든 하위
    const orderList=childOrder[n.id]||[];
    const children=[
      ...orderList.map(id=>rawChildren.find(ch=>ch.id===id)).filter(Boolean),
      ...rawChildren.filter(ch=>!orderList.includes(ch.id))
        .sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position))
    ];

    // 형제 드래그
    function handleChildDragMouseDown(e,childId){
      if(selectedId)return;
      e.stopPropagation(); e.preventDefault();
      isOrderDragging.current=true;
      setDragChild(childId); let cur=null;
      function mv(ev){
        const els=document.elementsFromPoint(ev.clientX,ev.clientY); let f=null;
        for(const el of els){if(el.dataset?.childid&&el.dataset?.parentid===n.id&&el.dataset.childid!==childId){f=el.dataset.childid;break;}}
        if(f!==cur){cur=f;setDragOverChild(f);}
      }
      function up(){
        document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);
        const t=cur; setDragChild(null); setDragOverChild(null);
        isOrderDragging.current=false;
        if(!t||t===childId)return;
        setChildOrder(prev=>{
          const sIds=children.map(ch=>ch.id);
          const ord=prev[n.id]||sIds;
          const base=[...ord.filter(id=>sIds.includes(id)),...sIds.filter(id=>!ord.includes(id))];
          const fi=base.indexOf(childId),ti=base.indexOf(t);
          if(fi<0||ti<0)return prev;
          const nx=[...base]; nx.splice(fi,1); nx.splice(ti,0,childId);
          // 서버 저장: 형제 순서를 각 노드의 sort_order 마지막 자리에 기록
          const toSaveChild=[];
          nx.forEach((childNodeId,childIdx)=>{
            const nd=nodesRef.current.find(x=>x.id===childNodeId);
            if(!nd)return;
            const parts=(nd.sort_order||"999_999_999").split("_");
            const newOrder=`${parts[0]||999}_${parts[1]||999}_${childIdx}`;
            if(String(nd.sort_order||"")!==newOrder) toSaveChild.push({...nd,sort_order:newOrder});
          });
          if(toSaveChild.length>0) saveSortOrder(toSaveChild);
          return {...prev,[n.id]:nx};
        });
      }
      document.addEventListener("mousemove",mv); document.addEventListener("mouseup",up);
    }

    return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center"}}>
        {depth>0&&<div style={{width:2,height:20,background:isSelected?"#6C63FF":"#CBD5E0"}}/>}
        <div

          style={{
            background:isSelected?"#EDE9FE":"#fff",
            border:`2px solid ${isSelected?"#6C63FF":isMoveTarget?"#86EFAC":gc}`,
            borderRadius:14,padding:"10px 13px",minWidth:118,maxWidth:155,
            textAlign:"center",
            cursor:isMoveTarget?"copy":"pointer",
            boxShadow:isSelected?"0 0 0 3px rgba(108,99,255,0.25)":"0 2px 10px rgba(0,0,0,0.08)",
            position:"relative",transition:"border 0.15s,box-shadow 0.15s",userSelect:"none"
          }}>
          {/* 직군 뱃지 */}
          <div style={{position:"absolute",top:-10,left:"50%",transform:"translateX(-50%)",
            background:gc,color:"#fff",fontSize:9,fontWeight:800,padding:"2px 8px",
            borderRadius:6,whiteSpace:"nowrap",pointerEvents:"none"}}>
            {n.role_group||"기타"}
          </div>
          {/* 직종 뱃지 */}
          {n.job_type&&<div style={{position:"absolute",top:4,right:4,background:"#94A3B8",
            color:"#fff",fontSize:8,fontWeight:700,padding:"1px 4px",borderRadius:4,pointerEvents:"none"}}>
            {n.job_type}
          </div>}
          {/* 상위 노드 표시 */}
          {n.parentId&&n.parentId!==""&&(()=>{
            const par=nodes.find(p=>p.id===n.parentId);
            if(!par)return null;
            return<div style={{position:"absolute",top:3,left:4,fontSize:8,color:"#A0AEC0",

              title={`상위: ${par.name}`}>↑{par.name}</div>;
          })()}
          {/* 선택 체크 뱃지 */}
          {isSelected&&<div style={{position:"absolute",top:-8,right:-8,width:18,height:18,
            background:"#6C63FF",borderRadius:"50%",display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:10,color:"#fff",fontWeight:800,pointerEvents:"none"}}>✓</div>}
          {/* 이동 타겟 플러스 뱃지 */}
          {isMoveTarget&&<div style={{position:"absolute",top:-8,right:-8,width:18,height:18,
            background:"#22C55E",borderRadius:"50%",display:"flex",alignItems:"center",
            justifyContent:"center",fontSize:12,color:"#fff",fontWeight:800,pointerEvents:"none"}}>+</div>}
          {/* 아바타 */}
          <div style={{width:32,height:32,borderRadius:"50%",background:gc,display:"flex",
            alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,
            color:"#fff",margin:"6px auto 5px",pointerEvents:"none"}}>
            {(n.name||"?")[0]}
          </div>
          {n.position&&<p style={{margin:"0 0 1px",fontSize:10,color:gc,fontWeight:800,pointerEvents:"none"}}>{n.position}</p>}
          {n.rank&&<p style={{margin:"0 0 2px",fontSize:9,color:"#A0AEC0",pointerEvents:"none"}}>{n.rank}</p>}
          <p style={{margin:"0 0 2px",fontSize:13,fontWeight:800,color:"#1A1A2E",pointerEvents:"none"}}>{n.name||"미지정"}</p>
          {n.emp_type&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:4,
            background:n.emp_type==="정규직"?"#EDE9FE":"#FEF3C7",
            color:n.emp_type==="정규직"?"#6C63FF":"#92400E",
            fontWeight:700,display:"inline-block",marginBottom:2,pointerEvents:"none"}}>{n.emp_type}</span>}
          {n.age&&<p style={{margin:"0 0 1px",fontSize:10,color:"#718096",pointerEvents:"none"}}>만 {n.age}세</p>}
          {n.phone&&<p style={{margin:"0 0 2px",fontSize:10,color:"#718096",pointerEvents:"none"}}>📞 {n.phone}</p>}
          {n.memo&&<p style={{margin:"0 0 2px",fontSize:9,color:"#9CA3AF",fontStyle:"italic",pointerEvents:"none"}}>{n.memo}</p>}
          {isSelected&&<p style={{margin:"3px 0 0",fontSize:8,color:"#6C63FF",fontWeight:700,
            background:"#EDE9FE",borderRadius:4,padding:"2px 4px",pointerEvents:"none"}}>
            다른 노드 클릭 → 그 아래로 이동
          </p>}
          {/* 액션 버튼 - 이동모드 중 숨김 */}
          {!selectedId&&<div style={{display:"flex",gap:3,justifyContent:"center",marginTop:6,flexWrap:"wrap"}}>
            <button onClick={e=>{e.stopPropagation();openEdit(n);}}
              style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:"#EEF2F7",
              color:"#6C63FF",border:"none",cursor:"pointer",fontWeight:700}}>✏ 수정</button>
            <button onClick={e=>{e.stopPropagation();openAdd(n.id);}}
              style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:"#F0FDF4",
              color:"#15803D",border:"none",cursor:"pointer",fontWeight:700}}>+ 하위</button>
            <button onClick={e=>{e.stopPropagation();delNode(n.id);}}
              style={{fontSize:9,padding:"2px 7px",borderRadius:5,background:"#FFF5F5",
              color:"#F87171",border:"none",cursor:"pointer",fontWeight:700}}>✕</button>
          </div>}
        </div>
        {children.length>0&&<>
          <div style={{width:2,height:20,background:"#CBD5E0"}}/>
          <div style={{display:"flex",gap:14,alignItems:"flex-start",position:"relative"}}>
            {children.length>1&&<div style={{position:"absolute",top:0,left:"50%",
              width:"calc(100% - 80px)",height:2,background:"#CBD5E0",transform:"translateX(-50%)"}}/>}
            {children.map(k=>{
              const isDk=dragChild===k.id,isOk=dragOverChild===k.id;
              const gcK=getGroupColor(k.role_group||"기타");
              return(
                <div key={k.id} data-childid={k.id} data-parentid={n.id}
                  style={{display:"flex",flexDirection:"column",alignItems:"center",

                    outlineOffset:6,borderRadius:12,transition:"opacity 0.1s"}}>
                  {!selectedId&&children.length>1&&(
                    <div onMouseDown={e=>handleChildDragMouseDown(e,k.id)}
                      style={{fontSize:10,color:gcK,marginBottom:4,padding:"2px 10px",
                        borderRadius:6,background:isDk?gcK+"33":gcK+"11",
                        border:`1px dashed ${gcK}55`,cursor:"grab",userSelect:"none",

  function renderCanvas(){
    if(nodes.length===0)return(
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",
        justifyContent:"center",height:"100%",gap:16,padding:40}}>
        <div style={{fontSize:52}}>🏢</div>
        <p style={{fontSize:15,fontWeight:600,color:"#A0AEC0",margin:0}}>조직도가 비어있습니다.</p>
        <p style={{fontSize:13,color:"#A0AEC0",margin:0,textAlign:"center"}}>
          인원 DB의 부서명이 <strong style={{color:"#6C63FF"}}>"{site.name}"</strong>인 인원이 있다면<br/>
          🔄 자동 생성을 눌러보세요.
        </p>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center"}}>
          <button onClick={()=>setAutoGenConfirm(true)}
            style={{background:"linear-gradient(90deg,#6C63FF,#9F7AEA)",color:"#fff",
            border:"none",borderRadius:10,padding:"10px 22px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            🔄 자동 생성
          </button>
          <button onClick={()=>openAdd("")}
            style={{background:"#EEF2F7",color:"#6C63FF",border:"1px solid #CBD5E0",
            borderRadius:10,padding:"10px 22px",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            + 수동 추가
          </button>
        </div>
      </div>
    );

    const nodeIds=new Set(nodes.map(n=>n.id));

    // ── 현장소장 (role_group="현장소장") ──
    const managers=nodes.filter(n=>n.role_group==="현장소장")
      .sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position));

    // ── 직군별로 모든 노드 분류 (종속 여부 무관) ──
    // 단, 각 직군 섹션에는 해당 직군의 "루트"만 표시
    // 루트 기준: ① parentId 없음 ② parentId의 role_group이 다른 직군
    const JT_ORDER2=["건축","기계","전기","안전","품질","관리","토목","기타"];
    const nonMgr=nodes.filter(n=>n.role_group!=="현장소장");

    // job_type → role_group 별 전체 노드 맵
    const byJT2={};
    nonMgr.forEach(n=>{
      const jt=n.job_type||"기타";
      if(!byJT2[jt])byJT2[jt]={};
      const rg=n.role_group||"기타";
      if(!byJT2[jt][rg])byJT2[jt][rg]=[];
      byJT2[jt][rg].push(n);
    });

    const allJTs=[...new Set([...JT_ORDER2,...Object.keys(byJT2)])].filter(jt=>byJT2[jt]);
    const orderedJTs=sectionOrder.length>0
      ?[...sectionOrder.filter(jt=>allJTs.includes(jt)),...allJTs.filter(jt=>!sectionOrder.includes(jt))]
      :allJTs;

    // ── 직군 드래그 핸들러 ──
    function handleRgMouseDown(e,jt,rg){
      if(selectedId)return;
      e.stopPropagation();
      e.preventDefault();
      isOrderDragging.current=true;
      setDragRg({jt,rg});
      let currentOverRg=null;

      function onMove(ev){
        const els=document.elementsFromPoint(ev.clientX,ev.clientY);
        let found=null;
        for(const el of els){
          if(el.dataset&&el.dataset.rg&&el.dataset.rgjt===jt&&el.dataset.rg!==rg){
            found={jt:el.dataset.rgjt,rg:el.dataset.rg};
            break;
          }
        }
        const fs=found?found.rg+"|"+found.jt:"null";
        const cs=currentOverRg?currentOverRg.rg+"|"+currentOverRg.jt:"null";
        if(fs!==cs){
          currentOverRg=found;
          setDragOverRg(found);
        }
      }

      function onUp(){
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        const target=currentOverRg;
        setDragRg(null);
        setDragOverRg(null);
        isOrderDragging.current=false;
        if(!target||target.rg===rg||target.jt!==jt)return;
        setRgOrder(prev=>{
          const allRgs=Object.keys(byJT2[jt]||{});
          const prevOrder=prev[jt]||[];
          const base=prevOrder.length>0
            ?[...prevOrder.filter(r=>allRgs.includes(r)),...allRgs.filter(r=>!prevOrder.includes(r))]
            :allRgs;
          const fi=base.indexOf(rg);
          const ti=base.indexOf(target.rg);
          if(fi<0||ti<0)return prev;
          const next=[...base];
          next.splice(fi,1);
          next.splice(ti,0,rg);
          const newPrev={...prev,[jt]:next};
          // 서버 저장: 직군 순서를 각 노드의 sort_order 중간자리에 기록
          const jtIdxRg=sectionOrder.indexOf(jt);
          const toSaveRg=[];
          next.forEach((rgKey,rgIdx)=>{
            nodesRef.current.filter(nd=>nd.job_type===jt&&nd.role_group===rgKey).forEach(nd=>{
              const parts=(nd.sort_order||"999_999_999").split("_");
              const newOrder=`${jtIdxRg>=0?jtIdxRg:parts[0]}_${rgIdx}_${parts[2]||999}`;
              if(String(nd.sort_order||"")!==newOrder) toSaveRg.push({...nd,sort_order:newOrder});
            });
          });
          if(toSaveRg.length>0) saveSortOrder(toSaveRg);
          return newPrev;
        });
      }

      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    }

    // ── 직종(jt) 섹션 드래그 핸들러 ──
    function handleSecMouseDown(e,jt){
      if(selectedId)return;
      e.stopPropagation();
      e.preventDefault();
      isOrderDragging.current=true;
      setDragSec(jt);
      let currentOverSec=null;

      function onMove(ev){
        const els=document.elementsFromPoint(ev.clientX,ev.clientY);
        let found=null;
        for(const el of els){
          if(el.dataset&&el.dataset.secjt&&el.dataset.secjt!==jt){
            found=el.dataset.secjt;
            break;
          }
        }
        if(found!==currentOverSec){
          currentOverSec=found;
          setDragOverSec(found||null);
        }
      }

      function onUp(){
        document.removeEventListener("mousemove",onMove);
        document.removeEventListener("mouseup",onUp);
        const target=currentOverSec;
        setDragSec(null);
        setDragOverSec(null);
        isOrderDragging.current=false;
        if(!target||target===jt)return;
        setSectionOrder(prev=>{
          const base=prev.length>0
            ?[...prev.filter(j=>allJTs.includes(j)),...allJTs.filter(j=>!prev.includes(j))]
            :allJTs;
          const fi=base.indexOf(jt);
          const ti=base.indexOf(target);
          if(fi<0||ti<0)return prev;
          const next=[...base];
          next.splice(fi,1);
          next.splice(ti,0,jt);
          // 서버 저장: 직종 순서를 각 노드의 sort_order 앞자리에 기록
          const toSaveJt=[];
          next.forEach((jtKey,jtIdx)=>{
            nodesRef.current.filter(nd=>nd.job_type===jtKey).forEach(nd=>{
              const parts=(nd.sort_order||"999_999_999").split("_");
              const newOrder=`${jtIdx}_${parts[1]||999}_${parts[2]||999}`;
              if(String(nd.sort_order||"")!==newOrder) toSaveJt.push({...nd,sort_order:newOrder});
            });
          });
          if(toSaveJt.length>0) saveSortOrder(toSaveJt);
          return next;
        });
      }

      document.addEventListener("mousemove",onMove);
      document.addEventListener("mouseup",onUp);
    }

    // ── renderRgNodes: 직군 섹션의 루트 노드 결정 ──
    // 이 직군의 노드 중 "같은 직군 부모가 없는" 노드만 최상위로 표시
    // - 부모 없음 → 루트
    // - 부모가 다른 직군 → 이 직군에서 루트 (🔗 아이콘 표시)
    // - 부모가 같은 직군 → NodeCard 재귀로 처리 (여기서 표시 안 함)
    function renderRgNodes(rgNodes){
      // 이미 다른 노드의 하위인 노드는 루트에서 제외 (NodeCard 재귀로 표시됨)
      const rgRoots=rgNodes.filter(n=>{
        if(!n.parentId||n.parentId==="")return true;  // 부모 없음 → 루트
        if(!nodeIds.has(n.parentId))return true;       // 부모가 이 현장에 없음 → 루트
        return false; // 부모가 있으면 NodeCard 재귀에서 표시
      }).sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position));

      return rgRoots.map(n=><NodeCard key={n.id} n={n} depth={0}/>);
    }

    return(
      <div style={{padding:"32px 40px",minWidth:"max-content",minHeight:"100%"}}
        onClick={e=>{if(selectedId&&e.target===e.currentTarget)setSelectedId(null);}}>

        {/* 현장소장 */}
        {managers.length>0&&(
          <div style={{marginBottom:24,display:"flex",flexDirection:"column",alignItems:"center"}}>
            <div style={{fontSize:11,fontWeight:800,color:"#6C63FF",padding:"3px 14px",
              borderRadius:12,background:"#EDE9FE",border:"1px solid #C4B5FD",marginBottom:12}}>
              현장소장
            </div>
            <div style={{display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
              {managers.map(n=><NodeCard key={n.id} n={n} depth={0}/>)}
            </div>
          </div>
        )}

        {managers.length>0&&orderedJTs.length>0&&(
          <div style={{height:2,background:"linear-gradient(90deg,transparent,#CBD5E0,transparent)",marginBottom:20}}/>
        )}

        {/* 직종별 섹션 */}
        <div style={{display:"flex",gap:32,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center"}}>
          {orderedJTs.map(jt=>{
            const rgMap=byJT2[jt]||{};
            const allRgs=Object.keys(rgMap);
            const prevRgOrder=rgOrder[jt]||[];
            const orderedRgs=prevRgOrder.length>0
              ?[...prevRgOrder.filter(r=>allRgs.includes(r)),...allRgs.filter(r=>!prevRgOrder.includes(r))]
              :allRgs;
            const gcJT=getGroupColor(mapJobTypeToRoleGroup(jt,""));

            const isDraggingThisSec=dragSec===jt;
            const isDropTargetSec=dragOverSec===jt;
            return(
              <div key={jt}
                data-secjt={jt}
                style={{display:"flex",flexDirection:"column",alignItems:"center",
                  opacity:isDraggingThisSec?0.35:1,
                  outline:isDropTargetSec?`3px dashed ${gcJT}`:"3px solid transparent",
                  outlineOffset:10,borderRadius:14,
                  transition:"opacity 0.1s"}}>
                {/* 직종 헤더 - 드래그 핸들 */}
                <div
                  onMouseDown={e=>handleSecMouseDown(e,jt)}
                  style={{fontSize:11,fontWeight:800,color:gcJT,marginBottom:12,
                    padding:"4px 16px",borderRadius:12,
                    background:isDraggingThisSec?gcJT+"44":isDropTargetSec?gcJT+"33":gcJT+"18",
                    border:`1px solid ${isDraggingThisSec||isDropTargetSec?gcJT:gcJT}55`,
                    cursor:selectedId?"default":orderedJTs.length>1?"grab":"default",
                    userSelect:"none",display:"flex",alignItems:"center",gap:5,
                    pointerEvents:selectedId?"none":"auto",
                    boxShadow:isDraggingThisSec?"0 4px 12px rgba(0,0,0,0.18)":"none",
                    transform:isDraggingThisSec?"scale(1.06) translateY(-2px)":"scale(1)",
                    transition:"all 0.1s"}}>
                  {orderedJTs.length>1&&<span style={{fontSize:12,opacity:0.55,letterSpacing:-2}}>⠿⠿</span>}
                  {jt}직
                </div>

                {/* 직군 목록 */}
                <div style={{display:"flex",gap:20,alignItems:"flex-start",flexWrap:"wrap",justifyContent:"center"}}>
                  {orderedRgs.map(rg=>{
                    const gcRG=getGroupColor(rg);
                    const isDraggingThisRg=dragRg&&dragRg.jt===jt&&dragRg.rg===rg;
                    const isDropTargetRg=dragOverRg&&dragOverRg.jt===jt&&dragOverRg.rg===rg;

                    return(
                      <div key={rg}
                        data-rg={rg}
                        data-rgjt={jt}
                        style={{
                          display:"flex",flexDirection:"column",alignItems:"center",
                          opacity:isDraggingThisRg?0.35:1,
                          outline:isDropTargetRg?`3px dashed ${gcRG}`:"3px solid transparent",
                          outlineOffset:8,borderRadius:12,
                          transition:"opacity 0.1s",
                        }}>
                        {/* 직군 헤더 - 드래그 핸들 (이동모드 중 비활성) */}
                        <div
                          onMouseDown={e=>handleRgMouseDown(e,jt,rg)}
                          style={{
                            fontSize:10,fontWeight:700,color:gcRG,marginBottom:8,
                            padding:"5px 14px",borderRadius:10,
                            background:isDraggingThisRg?gcRG+"44":isDropTargetRg?gcRG+"33":gcRG+"18",
                            border:`2px solid ${isDraggingThisRg||isDropTargetRg?gcRG:gcRG+"44"}`,
                            cursor:selectedId?"default":allRgs.length>1?"grab":"default",
                            userSelect:"none",
                            display:"flex",alignItems:"center",gap:5,
                            pointerEvents:selectedId?"none":"auto",
                            boxShadow:isDraggingThisRg?"0 4px 12px rgba(0,0,0,0.18)":"none",
                            transform:isDraggingThisRg?"scale(1.06) translateY(-2px)":"scale(1)",
                            transition:"all 0.1s",
                          }}>
                          {allRgs.length>1&&<span style={{fontSize:12,opacity:0.55,letterSpacing:-2}}>⠿⠿</span>}
                          {rg}
                          <span style={{fontSize:9,color:gcRG,opacity:0.7,fontWeight:600}}>
                            ({rgMap[rg].length}명)
                          </span>
                        </div>

                        {/* 노드 트리 */}
                        <div style={{display:"flex",gap:10,alignItems:"flex-start",
                          flexWrap:"wrap",justifyContent:"center"}}>
                          {renderRgNodes(rgMap[rg])}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>

        {/* 이동 모드 하단 안내바 */}
        {selectedId&&(
          <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
            background:"#1A1A2E",color:"#fff",borderRadius:14,padding:"10px 20px",
            fontSize:13,fontWeight:600,boxShadow:"0 4px 24px rgba(0,0,0,0.35)",
            display:"flex",gap:12,alignItems:"center",zIndex:500,whiteSpace:"nowrap"}}>
            <span style={{color:"#86EFAC"}}>✦ 이동 모드</span>
            <span>목적지 노드를 클릭하세요</span>
            <button onClick={e=>{
              e.stopPropagation();
              const moving=nodes.find(n=>n.id===selectedId);
              if(moving) onOrgSave({...moving,parentId:"",is_manual:"true"});
              setSelectedId(null);
            }} style={{background:"#6C63FF",border:"none",borderRadius:8,
              padding:"5px 14px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>
              최상위로
            </button>
            <button onClick={e=>{e.stopPropagation();setSelectedId(null);}}
              style={{background:"#64748B",border:"none",borderRadius:8,
              padding:"5px 14px",color:"#fff",fontSize:12,cursor:"pointer",fontWeight:700}}>
              취소
            </button>
          </div>
        )}

      </div>
    );
  }






  // ── 인원현황 패널 ──
  function StatsPanel(){
    // 집계
    const reg=nodes.filter(n=>!n.emp_type||n.emp_type==="정규직").length;
    const irr=nodes.filter(n=>n.emp_type==="비정규직").length;
    const byJT3={};
    nodes.forEach(n=>{const jt=n.job_type||"기타";byJT3[jt]=(byJT3[jt]||0)+1;});
    const posMap3={};
    nodes.forEach(n=>{const pos=n.position||"미지정";posMap3[pos]=(posMap3[pos]||0)+1;});
    const sortedPos=Object.entries(posMap3).sort((a,b)=>positionSortKey(a[0])-positionSortKey(b[0]));

    // 인력부족 종합
    const totalShortage=ORG_GROUPS.reduce((s,g)=>{
      const min=minStaffMap[g.label]||0;
      const cur=byGroup[g.label]||0;
      return s+(min>cur?min-cur:0);
    },0);
    const totalMin=ORG_GROUPS.reduce((s,g)=>s+(minStaffMap[g.label]||0),0);
    const shortGroups=ORG_GROUPS.filter(g=>(minStaffMap[g.label]||0)>0&&(byGroup[g.label]||0)<(minStaffMap[g.label]||0));

    return(
      <div style={{width:210,flexShrink:0,background:"#fff",borderRight:"1px solid #E2E8F0",
        overflowY:"auto",padding:"12px 10px",display:"flex",flexDirection:"column",gap:8}}>

        {/* 총 인원 KPI */}
        <div style={{background:"linear-gradient(135deg,#6C63FF,#9F7AEA)",borderRadius:10,padding:"10px 12px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
            <div>
              <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.75)",fontWeight:600}}>총 배치 인원</p>
              <p style={{margin:"1px 0 0",fontSize:24,fontWeight:800,color:"#fff",lineHeight:1}}>
                {nodes.length}<span style={{fontSize:11}}> 명</span>
              </p>
            </div>
            <div style={{textAlign:"right"}}>
              <p style={{margin:0,fontSize:9,color:"rgba(255,255,255,0.7)"}}>정규 {reg} · 비정규 {irr}</p>
              {totalMin>0&&<p style={{margin:"2px 0 0",fontSize:9,color:"rgba(255,255,255,0.85)",fontWeight:700}}>
                목표 {totalMin}명
              </p>}
            </div>
          </div>
        </div>

        {/* 인력부족 종합 알림 */}
        {totalShortage>0?(
          <div style={{background:"#FEF2F2",border:"1px solid #FCA5A5",borderRadius:8,
            padding:"7px 10px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>⚠️</span>
            <div>
              <p style={{margin:0,fontSize:11,fontWeight:800,color:"#DC2626"}}>총 {totalShortage}명 부족</p>
              <p style={{margin:"1px 0 0",fontSize:9,color:"#EF4444"}}>{shortGroups.length}개 직군 미달</p>
            </div>
          </div>
        ):(totalMin>0&&(
          <div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:8,
            padding:"7px 10px",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:14}}>✅</span>
            <p style={{margin:0,fontSize:11,fontWeight:700,color:"#16A34A"}}>인력 기준 충족</p>
          </div>
        ))}

        {/* ── 직군별 배치현황 (핵심, 컴팩트) ── */}
        <div>
          <p style={{margin:"0 0 5px",fontSize:10,fontWeight:800,color:"#374151",
            borderBottom:"1px solid #F3F4F6",paddingBottom:4}}>📂 직군별 배치현황</p>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            {ORG_GROUPS.map(g=>{
              const cur=byGroup[g.label]||0;
              const min=minStaffMap[g.label]||0;
              if(cur===0&&min===0)return null;
              const short=min>0&&cur<min;
              const ok=min>0&&cur>=min;
              const shortage=short?min-cur:0;
              const barPct=min>0?Math.min(Math.round(cur/min*100),100):(cur>0?100:0);
              return(
                <div key={g.label} style={{
                  display:"flex",alignItems:"center",gap:6,
                  padding:"4px 7px",borderRadius:6,
                  background:short?"#FFF5F5":ok?"#F0FDF4":"#F9FAFB",
                  border:`1px solid ${short?"#FECACA":ok?"#BBF7D0":"#F3F4F6"}`
                }}>
                  {/* 색상 도트 */}
                  <span style={{width:7,height:7,borderRadius:"50%",background:g.color,
                    flexShrink:0,display:"inline-block"}}/>
                  {/* 직군명 */}
                  <span style={{fontSize:10,fontWeight:700,color:g.color,width:40,flexShrink:0}}>{g.label}</span>
                  {/* 바 */}
                  <div style={{flex:1,height:5,background:"#E5E7EB",borderRadius:3,overflow:"hidden",position:"relative"}}>
                    <div style={{height:"100%",width:`${barPct}%`,
                      background:short?"#EF4444":ok?"#22C55E":g.color,
                      borderRadius:3,transition:"width 0.3s"}}/>
                  </div>
                  {/* 수치 */}
                  <span style={{fontSize:10,fontWeight:800,
                    color:short?"#DC2626":ok?"#16A34A":"#374151",
                    minWidth:28,textAlign:"right",flexShrink:0}}>
                    {cur}{min>0&&<span style={{fontSize:9,fontWeight:400,color:"#9CA3AF"}}>/{min}</span>}
                  </span>
                  {/* 부족 표시 */}
                  {short&&<span style={{fontSize:9,color:"#DC2626",fontWeight:800,
                    minWidth:22,flexShrink:0}}>▼{shortage}</span>}
                  {ok&&<span style={{fontSize:10,color:"#16A34A",minWidth:22,flexShrink:0}}>✓</span>}
                  {!short&&!ok&&min===0&&<span style={{minWidth:22,flexShrink:0}}/>}
                </div>
              );
            })}
          </div>
        </div>

        {/* 직종별 */}
        {Object.keys(byJT3).length>0&&(
          <div>
            <p style={{margin:"0 0 5px",fontSize:10,fontWeight:800,color:"#374151",
              borderBottom:"1px solid #F3F4F6",paddingBottom:4}}>🔧 직종별</p>
            {Object.entries(byJT3).sort((a,b)=>b[1]-a[1]).map(([jt,cnt])=>{
              const pct=nodes.length?Math.round(cnt/nodes.length*100):0;
              const gcS=getGroupColor(mapJobTypeToRoleGroup(jt,""));
              return(
                <div key={jt} style={{display:"flex",alignItems:"center",gap:5,marginBottom:3}}>
                  <span style={{fontSize:9,fontWeight:700,color:gcS,width:26,flexShrink:0}}>{jt}</span>
                  <div style={{flex:1,height:4,background:"#E5E7EB",borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",width:`${pct}%`,background:gcS,borderRadius:2}}/>
                  </div>
                  <span style={{fontSize:9,fontWeight:800,color:"#374151",width:22,textAlign:"right",flexShrink:0}}>{cnt}명</span>
                </div>
              );
            })}
          </div>
        )}

        {/* 직위별 */}
        {sortedPos.length>0&&(
          <div>
            <p style={{margin:"0 0 5px",fontSize:10,fontWeight:800,color:"#374151",
              borderBottom:"1px solid #F3F4F6",paddingBottom:4}}>🏅 직위별</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
              {sortedPos.map(([pos,cnt])=>(
                <div key={pos} style={{display:"flex",alignItems:"center",gap:3,
                  padding:"2px 7px",borderRadius:10,background:"#F3F4F6",border:"1px solid #E5E7EB"}}>
                  <span style={{fontSize:9,color:"#4B5563",fontWeight:600}}>{pos}</span>
                  <span style={{fontSize:10,fontWeight:800,color:"#6C63FF"}}>{cnt}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    );
  }



  return(
    <div style={{position:"fixed",inset:0,background:"rgba(15,15,30,0.65)",zIndex:400,display:"flex",flexDirection:"column"}}
      onClick={()=>{}}>
      <div style={{background:"#F4F6FA",width:"100%",height:"100%",display:"flex",flexDirection:"column",overflow:"hidden"}}
        onClick={e=>e.stopPropagation()}>

        {/* 헤더 */}
        <div style={{background:"#fff",borderBottom:"1px solid #E2E8F0",padding:"12px 20px",
          display:"flex",alignItems:"center",gap:12,flexShrink:0,flexWrap:"wrap"}}>
          <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#6C63FF,#9F7AEA)",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>🏢</div>
          <div style={{flex:1,minWidth:100}}>
            <p style={{margin:0,fontSize:10,color:"#A0AEC0",fontWeight:600}}>현장 조직도</p>
            <h2 style={{margin:0,fontSize:16,fontWeight:800,color:"#1A1A2E"}}>{site.name}</h2>
          </div>
          {genStatus&&<div style={{background:"#EDE9FE",border:"1px solid #C4B5FD",borderRadius:8,
            padding:"6px 14px",fontSize:12,fontWeight:700,color:"#6C63FF"}}>⏳ {genStatus}</div>}
          {shortages.length>0&&!genStatus&&(
            <div style={{display:"flex",alignItems:"center",gap:6,background:"#FEF2F2",
              border:"1px solid #FCA5A5",borderRadius:8,padding:"6px 12px"}}>
              <span>⚠️</span>
              <span style={{fontSize:11,fontWeight:700,color:"#DC2626"}}>인력 부족 {shortages.length}개 직군</span>
            </div>
          )}
          <div style={{display:"flex",gap:6,flexShrink:0,flexWrap:"wrap"}}>
            <button onClick={()=>setShowStats(v=>!v)}
              style={{background:"#EEF2F7",color:"#4A5568",border:"1px solid #CBD5E0",

              {showStats?"📊 숨기기":"📊 현황"}
            </button>
            <button onClick={()=>setShowMinStaffEditor(v=>!v)}

              ⚙ 최소인원
            </button>
            <button onClick={()=>setAutoGenConfirm(true)} disabled={!!genStatus}
              style={{background:genStatus?"#A0AEC0":"linear-gradient(90deg,#6C63FF,#9F7AEA)",
              color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",
              fontWeight:700,fontSize:11,cursor:genStatus?"not-allowed":"pointer"}}>
              🔄 자동 생성
            </button>
            <button onClick={()=>{if(isAdmin){setShowPersonnelMgr(true);}else{setShowAdminPw(true);setAdminPwInput("");setAdminPwError("");}}}
              style={{background:"#F0FDF4",color:"#15803D",border:"1px solid #86EFAC",
              borderRadius:8,padding:"7px 12px",fontWeight:700,fontSize:11,cursor:"pointer"}}>
              🔐 인원 관리
            </button>
            <button onClick={()=>openAdd("")}
              style={{background:"#6C63FF",color:"#fff",border:"none",
              borderRadius:8,padding:"7px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
              + 추가
            </button>
            <button onClick={onClose}
              style={{background:"none",border:"none",fontSize:24,color:"#A0AEC0",cursor:"pointer",lineHeight:1}}>
              ×
            </button>
          </div>
        </div>

        {/* 인력부족 배너 */}
        {shortages.length>0&&(
          <div style={{background:"#FFF5F5",borderBottom:"1px solid #FCA5A5",
            padding:"7px 20px",flexShrink:0,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:11,fontWeight:700,color:"#DC2626"}}>⚠ 인력 부족:</span>
            {shortages.map(s=>(
              <span key={s.group} style={{fontSize:11,padding:"2px 8px",borderRadius:6,
                background:"#FEE2E2",color:"#DC2626",fontWeight:600,border:"1px solid #FCA5A5"}}>
                {s.group} ({s.current}/{s.min}명)
              </span>
            ))}
          </div>
        )}

        {/* 최소인원 설정 */}
        {showMinStaffEditor&&(
          <div style={{background:"#FFFBEB",borderBottom:"1px solid #FCD34D",padding:"12px 20px",flexShrink:0}}>
            <p style={{margin:"0 0 10px",fontSize:12,fontWeight:800,color:"#92400E"}}>⚙ 직군별 최소 필요 인원</p>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {ORG_GROUPS.map(g=>(
                <div key={g.label} style={{display:"flex",alignItems:"center",gap:5,
                  background:"#fff",borderRadius:8,padding:"5px 10px",border:"1px solid #FCD34D"}}>
                  <span style={{width:8,height:8,borderRadius:"50%",background:g.color,display:"inline-block"}}/>
                  <span style={{fontSize:11,fontWeight:700,color:g.color,minWidth:44}}>{g.label}</span>
                  <input type="number" min="0" max="20" defaultValue={minStaffMap[g.label]||0}
                    onBlur={e=>saveMinStaff(g.label,e.target.value)}
                    style={{width:40,border:"1px solid #CBD5E0",borderRadius:5,padding:"2px 6px",fontSize:12,textAlign:"center"}}/>
                  <span style={{fontSize:10,color:"#A0AEC0"}}>명</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* 본문 */}
        <div style={{flex:1,overflow:"hidden",display:"flex"}}>
          {showStats&&<StatsPanel/>}
          <div ref={canvasRef}
            onMouseDown={e=>{
              if(e.button!==0||selectedId||modalForm)return;
              // 드래그 핸들 요소(data-rg, data-secjt, data-childid) 위에서는 패닝 차단
              let el=e.target;
              while(el&&el!==canvasRef.current){
                if(el.dataset&&(el.dataset.secjt||el.dataset.rg||el.dataset.childid))return;
                el=el.parentElement;
              }
              isDragging.current=true;
              dragStart.current={x:e.clientX,y:e.clientY,sl:canvasRef.current.scrollLeft,st:canvasRef.current.scrollTop};
              canvasRef.current.style.cursor="grabbing";
              canvasRef.current.style.userSelect="none";
            }}
            onMouseMove={e=>{
              if(!isDragging.current)return;
              canvasRef.current.scrollLeft=dragStart.current.sl-(e.clientX-dragStart.current.x);
              canvasRef.current.scrollTop=dragStart.current.st-(e.clientY-dragStart.current.y);
            }}
            onMouseUp={()=>{isDragging.current=false;if(canvasRef.current){canvasRef.current.style.cursor=selectedId?"default":"grab";canvasRef.current.style.userSelect="";}}}
            onMouseLeave={()=>{isDragging.current=false;if(canvasRef.current){canvasRef.current.style.cursor=selectedId?"default":"grab";canvasRef.current.style.userSelect="";}}}
            style={{flex:1,overflow:"auto",cursor:selectedId?"default":"grab"}}>
            {renderCanvas()}
          </div>
        </div>
      </div>

      {/* 자동생성 확인 모달 */}
      {autoGenConfirm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:700,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>setAutoGenConfirm(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:380,
            boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"24px 24px 20px",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔄</div>
              <h3 style={{margin:"0 0 10px",fontSize:16,fontWeight:800,color:"#1A1A2E"}}>조직도 자동 생성</h3>
              <p style={{margin:"0 0 6px",fontSize:13,color:"#4A5568"}}>
                인원 DB에서 <strong>부서명 = "{site.name}"</strong>인 인원을<br/>
                <strong>직종 → 직군 → 직위</strong> 순으로 배치합니다.
              </p>
              <p style={{margin:"0 0 6px",fontSize:12,color:"#6C63FF"}}>
                • 중복 인원 자동 제거 (사번 기준)<br/>
                • 기존 조직도 데이터는 전체 교체됩니다
              </p>
              <p style={{margin:"0 0 20px",fontSize:12,color:"#EF4444",fontWeight:600}}>⚠ 이 현장의 기존 조직도는 삭제됩니다.</p>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setAutoGenConfirm(false)}
                  style={{flex:1,background:"#F7FAFC",border:"1px solid #CBD5E0",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#718096",cursor:"pointer",fontWeight:600}}>취소</button>
                <button onClick={autoGenerateOrg}
                  style={{flex:1,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)",
                  border:"none",borderRadius:10,padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>생성</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 노드 추가/수정 모달 */}
      {modalForm&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.5)",zIndex:600,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>{setModalForm(null);setNameSuggest([]);}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,
            width:"100%",maxWidth:420,boxShadow:"0 8px 40px rgba(0,0,0,0.2)",
            overflow:"hidden",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"20px 22px"}}>
              <h3 style={{margin:"0 0 16px",fontSize:15,fontWeight:800,color:"#1A1A2E"}}>
                {modalForm.isNew?"+ 노드 추가":"✏ 노드 수정"}
              </h3>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{position:"relative"}}>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>성명</label>
                  <input value={modalForm.name} onChange={onNameChange} placeholder="인원 DB 자동완성" style={inp2}/>
                  {nameSuggest.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",
                      border:"1px solid #CBD5E0",borderRadius:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",
                      zIndex:50,overflow:"hidden",maxHeight:200,overflowY:"auto"}}>
                      {nameSuggest.map(p=>{
                        const rgS=mapJobTypeToRoleGroup(p.job_type,p.position);
                        const gcS2=getGroupColor(rgS);
                        return(
                          <div key={p.id||p.emp_id||p.name} onClick={()=>applyPersonnel(p)}
                            style={{padding:"9px 14px",cursor:"pointer",borderBottom:"1px solid #EEF2F7",
                            display:"flex",alignItems:"center",gap:8}}
                            onMouseEnter={e=>e.currentTarget.style.background="#F8F7FF"}
                            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                            <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,
                              background:gcS2+"22",color:gcS2,fontWeight:700}}>{rgS}</span>
                            <span style={{fontSize:13,fontWeight:700,color:"#1A1A2E"}}>{p.name}</span>
                            <span style={{fontSize:10,color:"#718096",flex:1}}>
                              {[p.position,p.job_type,p.department].filter(Boolean).join(" · ")}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직종</label>
                    <select value={modalForm.job_type} onChange={e=>{
                      const jt=e.target.value;
                      setModalForm(f=>({...f,job_type:jt,role_group:mapJobTypeToRoleGroup(jt,f.position)}));
                    }} style={inp2}>
                      {JOB_TYPES.map(j=><option key={j}>{j}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직군</label>
                    <select value={modalForm.role_group} onChange={mf("role_group")} style={inp2}>
                      {ORG_GROUPS.map(g=><option key={g.label}>{g.label}</option>)}
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직위</label>
                    <input value={modalForm.position} onChange={mf("position")} placeholder="부장, 차장..." style={inp2}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>직급</label>
                    <input value={modalForm.rank} onChange={mf("rank")} placeholder="3급, 4급..." style={inp2}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>사원구분</label>
                  <div style={{display:"flex",gap:6}}>
                    {["정규직","비정규직"].map(t=>(
                      <button key={t} onClick={()=>setModalForm(f=>({...f,emp_type:t}))}
                        style={{flex:1,padding:"8px",borderRadius:8,
                        border:`1px solid ${modalForm.emp_type===t?"#6C63FF":"#CBD5E0"}`,
                        background:modalForm.emp_type===t?"#6C63FF":"#fff",
                        color:modalForm.emp_type===t?"#fff":"#4A5568",
                        fontSize:12,fontWeight:700,cursor:"pointer"}}>{t}</button>
                    ))}
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>나이(만)</label>
                    <input type="number" value={modalForm.age} onChange={mf("age")} placeholder="45" style={inp2}/>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>전화번호</label>
                    <input value={modalForm.phone} onChange={mf("phone")} placeholder="010-0000-0000" style={inp2}/>
                  </div>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>비고</label>
                  <input value={modalForm.memo} onChange={mf("memo")} placeholder="자유 메모" style={inp2}/>
                </div>
                <div>
                  <label style={{fontSize:11,fontWeight:700,color:"#4A5568",display:"block",marginBottom:4}}>상위 노드 (종속 관계)</label>
                  <select value={modalForm.parentId||""} onChange={mf("parentId")} style={inp2}>
                    <option value="">── 최상위 (없음)</option>
                    {nodes.filter(n=>n.id!==modalForm.nodeId)
                      .sort((a,b)=>positionSortKey(a.position)-positionSortKey(b.position))
                      .map(n=>(
                        <option key={n.id} value={n.id}>
                          {n.name} ({n.position||n.role_group||"−"}) [{n.job_type||"−"}]
                        </option>
                      ))}
                  </select>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button onClick={()=>{setModalForm(null);setNameSuggest([]);}}
                  style={{flex:1,background:"#F7FAFC",border:"1px solid #CBD5E0",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#718096",cursor:"pointer",fontWeight:600}}>취소</button>
                <button onClick={saveNode}
                  style={{flex:2,background:"#6C63FF",border:"none",
                  borderRadius:10,padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700}}>저장</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* 관리자 암호 */}
      {showAdminPw&&(
        <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.5)",zIndex:600,
          display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={()=>setShowAdminPw(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:320,
            boxShadow:"0 8px 40px rgba(0,0,0,0.18)",overflow:"hidden"}}>
            <div style={{height:4,background:"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
            <div style={{padding:"24px 24px 20px",textAlign:"center"}}>
              <div style={{fontSize:36,marginBottom:12}}>🔐</div>
              <h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:800,color:"#1A1A2E"}}>관리자 인증</h3>
              <input type="password" value={adminPwInput} onChange={e=>setAdminPwInput(e.target.value)}
                onKeyDown={e=>{if(e.key==="Enter"){if(adminPwInput==="dongbu"){setShowAdminPw(false);setShowPersonnelMgr(true);}else setAdminPwError("암호가 틀렸습니다.");}}}
                placeholder="관리자 암호" autoFocus
                style={{width:"100%",border:`1px solid ${adminPwError?"#F87171":"#CBD5E0"}`,
                borderRadius:10,padding:"10px 14px",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:6}}/>
              {adminPwError&&<p style={{margin:"0 0 10px",fontSize:11,color:"#F87171"}}>{adminPwError}</p>}
              <button onClick={()=>{if(adminPwInput==="dongbu"){setShowAdminPw(false);setShowPersonnelMgr(true);}else setAdminPwError("암호가 틀렸습니다.");}}
                style={{width:"100%",background:"#6C63FF",border:"none",borderRadius:10,
                padding:"11px",fontSize:13,color:"#fff",cursor:"pointer",fontWeight:700,marginTop:4}}>확인</button>
            </div>
          </div>
        </div>
      )}

      {showPersonnelMgr&&<PersonnelMgrModal personnel={personnel}
        onSave={onPersonnelSave} onDelete={onPersonnelDelete}
        onClose={()=>setShowPersonnelMgr(false)}/>}
    </div>
  );
}


function SitePMBoard({sites=[],onSave,onDelete,orgNodes=[],onOrgSave,onOrgDelete,onOrgSaveBump,onOrgReplaceForSite,personnel=[],onPersonnelSave,onPersonnelDelete,siteMinStaff=[],onMinStaffSave,isMobile=false}){
  const [showModal,setShowModal]=useState(false);
  const [orgSite,setOrgSite]=useState(null);
  const [editing,setEditing]=useState(null);
  const [searchQ,setSearchQ]=useState("");
  const [filterCompletion,setFilterCompletion]=useState("전체");
  const [filterCostRate,setFilterCostRate]=useState("전체");
  const [filterOrderType,setFilterOrderType]=useState("전체");
  const emptyForm={name:"",pm:"",start_date:"",completion:"",location:"",scale:"",client:"",contract_amount:"",cost_rate:"",order_type:"",equity_rate:"",estimate_pm:"",memo:""};
  const [form,setForm]=useState(emptyForm);
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  function saveSite(){
    if(!form.name.trim()||!form.pm.trim()){alert("현장명과 담당PM을 입력하세요.");return;}
    onSave({...form,id:editing?editing.id:undefined});
    setShowModal(false);setEditing(null);setForm(emptyForm);
  }
  function del(id){
    if(!window.confirm("이 현장을 삭제하시겠습니까?"))return;
    onDelete(id);
  }
  function openNew(){setEditing(null);setForm(emptyForm);setShowModal(true);}
  function openEdit(s){setEditing(s);setForm({name:s.name,pm:s.pm,start_date:s.start_date||"",completion:s.completion||"",location:s.location||"",scale:s.scale||"",client:s.client||"",contract_amount:s.contract_amount||"",cost_rate:s.cost_rate||"",order_type:s.order_type||"",equity_rate:s.equity_rate||"",estimate_pm:s.estimate_pm||"",memo:s.memo||""});setShowModal(true);}
  const daysLeft=d=>{if(!d)return null;return Math.ceil((new Date(d+"T00:00:00")-new Date())/(1000*60*60*24));};
  // 착공일~준공일 기준 오늘 공정율 계산 (0~100%)
  const calcProgress=(start,end)=>{
    if(!start||!end)return null;
    const s=new Date(start+"T00:00:00"), e=new Date(end+"T00:00:00"), t=new Date();
    const total=e-s; if(total<=0)return null;
    const elapsed=t-s;
    if(elapsed<=0)return 0;
    if(elapsed>=total)return 100;
    return Math.round(elapsed/total*100);
  };
  const q=searchQ.trim().toLowerCase();
  // 발주방식 고유값 목록 (동적)
  const orderTypes=["전체",...Array.from(new Set(sites.map(s=>s.order_type||"").filter(Boolean))).sort((a,b)=>a.localeCompare(b,"ko"))];
  // 필터 적용 + 준공일자 오름차순 정렬
  const filtered=[...sites]
    .filter(s=>{
      if(q&&!(s.name.toLowerCase().includes(q)||s.pm.toLowerCase().includes(q)||(s.location||"").toLowerCase().includes(q)||(s.client||"").toLowerCase().includes(q)))return false;
      // 준공일자 필터
      if(filterCompletion!=="전체"){
        const days=s.completion?Math.ceil((new Date(s.completion+"T00:00:00")-new Date())/(1000*60*60*24)):null;
        if(filterCompletion==="임박(D-30)"&&!(days!==null&&days>=0&&days<=30))return false;
        if(filterCompletion==="진행중"&&!(days!==null&&days>30))return false;
        if(filterCompletion==="준공완료"&&!(days!==null&&days<0))return false;
      }
      // 원가율 필터
      if(filterCostRate!=="전체"){
        const cr=Number(s.cost_rate||0);
        if(filterCostRate==="100% 이상"&&cr<100)return false;
        if(filterCostRate==="90~99%"&&!(cr>=90&&cr<100))return false;
        if(filterCostRate==="90% 미만"&&cr>=90)return false;
      }
      // 발주방식 필터
      if(filterOrderType!=="전체"&&(s.order_type||"")!==filterOrderType)return false;
      return true;
    })
    .sort((a,b)=>{
      if(!a.completion&&!b.completion)return 0;
      if(!a.completion)return 1;
      if(!b.completion)return -1;
      return a.completion.localeCompare(b.completion);
    });
  const activeFilterCount=[filterCompletion,filterCostRate,filterOrderType].filter(v=>v!=="전체").length;
  const resetFilters=()=>{setFilterCompletion("전체");setFilterCostRate("전체");setFilterOrderType("전체");setSearchQ("");};
  const inpSt={width:"100%",border:"1px solid #CBD5E0",borderRadius:8,padding:"10px 12px",fontSize:14,color:"#2D3748",outline:"none",boxSizing:"border-box"};
  const lbl=(t,req)=><label style={{display:"block",fontSize:12,fontWeight:700,color:"#4A5568",marginBottom:5}}>{t}{req&&<span style={{color:"#F87171"}}> *</span>}</label>;
  const selSt=(active)=>({border:`1.5px solid ${active?"#6C63FF":"#CBD5E0"}`,borderRadius:8,padding:"7px 10px",fontSize:12,color:active?"#6C63FF":"#4A5568",background:active?"#EDE9FE":"#fff",fontWeight:active?700:400,cursor:"pointer",outline:"none"});
  return <div>
    {/* 검색 + 추가 버튼 */}
    <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:200,position:"relative"}}>
        <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#A0AEC0",fontSize:16,pointerEvents:"none"}}>🔍</span>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="현장명, PM, 위치, 발주처 검색..."
          style={{width:"100%",border:"1px solid #CBD5E0",borderRadius:10,padding:isMobile?"8px 10px 8px 34px":"10px 12px 10px 38px",fontSize:isMobile?13:14,color:"#2D3748",outline:"none",boxSizing:"border-box",background:"#fff"}}/>
        {searchQ&&<button onClick={()=>setSearchQ("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#A0AEC0",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>}
      </div>
      <span style={{fontSize:13,color:"#718096",whiteSpace:"nowrap"}}>{filtered.length}개 현장</span>
      <button onClick={openNew} style={{...btn("#6C63FF"),fontSize:13,padding:"10px 20px",whiteSpace:"nowrap"}}>+ 현장 추가</button>
    </div>
    {/* 필터 행 */}
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
      <span style={{fontSize:12,color:"#718096",fontWeight:600,whiteSpace:"nowrap"}}>🔧 필터</span>
      {/* 준공일자 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>준공</span>
        {["전체","임박(D-30)","진행중","준공완료"].map(v=><button key={v} onClick={()=>setFilterCompletion(v)} style={selSt(filterCompletion===v)}>{v}</button>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      {/* 원가율 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>원가율</span>
        {["전체","90% 미만","90~99%","100% 이상"].map(v=><button key={v} onClick={()=>setFilterCostRate(v)} style={selSt(filterCostRate===v)}>{v}</button>)}
      </div>
      <div style={{width:1,height:20,background:"#E2E8F0"}}/>
      {/* 발주방식 */}
      <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:11,color:"#A0AEC0",whiteSpace:"nowrap"}}>발주방식</span>
        {orderTypes.map(v=><button key={v} onClick={()=>setFilterOrderType(v)} style={selSt(filterOrderType===v)}>{v}</button>)}
      </div>
      {activeFilterCount>0&&<button onClick={resetFilters} style={{...btn("#FFF5F5","#F87171"),fontSize:11,padding:"5px 10px",border:"1px solid #FCA5A5",marginLeft:4}}>✕ 초기화</button>}
    </div>
    {/* 검색/필터 결과 없음 */}
    {filtered.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#A0AEC0",fontSize:14}}>
      {q||activeFilterCount>0?"조건에 맞는 현장이 없습니다.":"등록된 현장이 없습니다."}
    </div>}
    {/* 카드 그리드 */}
    <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"repeat(auto-fill,minmax(320px,1fr))",gap:isMobile?12:18}}>
      {filtered.map(s=>{
        const days=daysLeft(s.completion);
        const urgent=days!==null&&days>=0&&days<=30;
        const done=days!==null&&days<0;
        const progress=calcProgress(s.start_date,s.completion);
        const progColor=done?"#94A3B8":progress>=80?"#F87171":progress>=50?"#FBBF24":"#6C63FF";
        const dTag=done
          ?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#F7FAFC",color:"#A0AEC0",fontWeight:700,border:"1px solid #CBD5E0"}}>준공완료</span>
          :urgent?<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#FFFBEB",color:"#D97706",fontWeight:800,border:"1px solid #FBBF24"}}>⚠ D-{days}</span>
          :<span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:"#EDE9FE",color:"#6C63FF",fontWeight:700,border:"1px solid #C4B5FD"}}>D-{days??"-"}</span>;
        return <div key={s.id} style={{background:"#fff",border:`1px solid ${urgent?"#FBBF24":done?"#E2E8F0":"#E2E8F0"}`,borderRadius:16,boxShadow:`0 2px 10px rgba(0,0,0,0.07)`,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          {/* 상단 컬러바 */}
          <div style={{height:5,background:done?"#CBD5E0":urgent?"linear-gradient(90deg,#FBBF24,#F87171)":"linear-gradient(90deg,#6C63FF,#9F7AEA)"}}/>
          <div style={{padding:isMobile?"14px 14px":"18px 20px",flex:1}}>
            {/* 헤더 행: 현장명 + D-태그 */}
