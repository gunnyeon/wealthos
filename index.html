async function apiGet(sheet){
  const r=await fetch(`${API_URL}?sheet=${sheet}`);
  const d=await r.json();
  if(!d.ok)return[];
  // Sheets에서 날짜가 Date 객체 문자열로 올 경우 yyyy-MM-dd 형식으로 정규화
  return (d.data||[]).map(row=>{
    const normalized={...row};
    ["start_date","end_date","due_date"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // Date 객체 문자열이면 파싱해서 yyyy-MM-dd로 변환
        if(v.includes("T")||v.includes("/")||(!v.match(/^\d{4}-\d{2}-\d{2}$/)&&v.length>0)){
          const dt=new Date(v);
          if(!isNaN(dt)){
            const yy=dt.getFullYear();
            const mm=String(dt.getMonth()+1).padStart(2,"0");
            const dd=String(dt.getDate()).padStart(2,"0");
            normalized[key]=`${yy}-${mm}-${dd}`;
          }
        }
      }
    });
    ["start_time","end_time"].forEach(key=>{
      if(normalized[key]){
        const v=String(normalized[key]);
        // HH:MM 형식이 아니면 정규화
        if(v.includes("T")){
          const dt=new Date(v);
          if(!isNaN(dt)){
            normalized[key]=`${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
          }
        }
      }
    });
    return normalized;
  });
}
// POST body 방식 (URL 크기 제한 없음, CORS: text/plain = simple request)
async function apiPost(payload){
  try{
    await fetch(API_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify(payload)
    });
  }catch(e){
    // POST 실패 시 GET fallback
    const params=new URLSearchParams({payload:JSON.stringify(payload)});
    await fetch(`${API_URL}?${params}`);
  }
}
async function apiInit(sheet,headers){await apiPost({sheet,action:"init",headers});}
async function apiUpsert(sheet,row){await apiPost({sheet,action:"upsert",row});}
async function apiDelete(sheet,id){await apiPost({sheet,action:"delete",id});}
// replace_all: GET 방식 유지 (Apps Script CORS 안정)
// 방식: ①기존 행 개별 삭제 → ②새 행 순차 upsert (URL 길이 무관)
async function apiReplaceAll(sheet,headers,rows){
  // 1단계: 시트의 기존 데이터 조회 → id 목록 추출
  try{
    const r=await fetch(`${API_URL}?sheet=${sheet}`);
    const d=await r.json();
    if(d.ok&&d.data&&d.data.length>0){
      const existIds=d.data.map(row=>row.id).filter(Boolean);
      // 병렬 삭제 (30개씩 배치)
      const BATCH=30;
      for(let i=0;i<existIds.length;i+=BATCH){
        await Promise.all(existIds.slice(i,i+BATCH).map(id=>apiDelete(sheet,id)));
        if(i+BATCH<existIds.length) await new Promise(r=>setTimeout(r,200));
      }
    }
  }catch(e){console.warn("apiReplaceAll 삭제 단계 오류",e);}
  // 2단계: 새 행 순차 upsert (20개씩 배치)
  const BATCH2=20;
  for(let i=0;i<rows.length;i+=BATCH2){
    await Promise.all(rows.slice(i,i+BATCH2).map(row=>apiUpsert(sheet,row)));
    if(i+BATCH2<rows.length) await new Promise(r=>setTimeout(r,300));
  }
}

// ── 상수 ──────────────────────────────────────────────
const AVATAR_COLORS=["#6C63FF","#FF6B9D","#2EC4B6","#FB923C","#4ADE80","#F9A8D4","#60A5FA","#FBBF24"];
function getAvatarColor(name){let h=0;for(let c of(name||"?"))h=(h*31+c.charCodeAt(0))%AVATAR_COLORS.length;return AVATAR_COLORS[h];}
function getLocalDateStr(date){
  // toISOString()은 UTC 기준이라 한국(UTC+9) 자정 이후 날짜가 달라짐
  // 로컬 시간 기준으로 yyyy-MM-dd 반환
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}
function getDayOfWeek(dateStr){
  if(!dateStr)return"";
  const days=["일","월","화","수","목","금","토"];
  const d=new Date(dateStr+"T00:00:00");
  return isNaN(d)?"":days[d.getDay()];
}

const HOLIDAYS={"01-01":"신정","03-01":"삼일절","05-05":"어린이날","06-06":"현충일","08-15":"광복절","10-03":"개천절","10-09":"한글날","12-25":"성탄절","2025-01-28":"설날 연휴","2025-01-29":"설날","2025-01-30":"설날 연휴","2025-05-05":"어린이날/부처님오신날","2025-10-05":"추석 연휴","2025-10-06":"추석","2025-10-07":"추석 연휴","2026-02-16":"설날 연휴","2026-02-17":"설날","2026-02-18":"설날 연휴","2026-05-24":"부처님오신날","2026-09-24":"추석 연휴","2026-09-25":"추석","2026-09-26":"추석 연휴"};
function getHoliday(ds){return HOLIDAYS[ds]||HOLIDAYS[ds.slice(5)]||null;}

function sortTasks(arr){return[...arr].sort((a,b)=>{const d=(a.start_date||"9999").localeCompare(b.start_date||"9999");return d!==0?d:(a.due_date||"9999").localeCompare(b.due_date||"9999");});}
function sortSched(arr){return[...arr].sort((a,b)=>{const d=a.start_date.localeCompare(b.start_date);return d!==0?d:(a.start_time||"00:00").localeCompare(b.start_time||"00:00");});}

function useWindowSize(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    const h=()=>setW(window.innerWidth);
    window.addEventListener("resize",h);
    return()=>window.removeEventListener("resize",h);
  },[]);
  return w;
}

// ── 메인 앱 ───────────────────────────────────────────
function App(){
  const winW=useWindowSize();
  const isMobile=winW<=767;
  const isTablet=winW>767&&winW<=1024;
  const [myName,setMyName]=useState(()=>{try{return sessionStorage.getItem("ts-name")||"";}catch{return "";}});
  const [nameInput,setNameInput]=useState("");
  const [activeMenu,setActiveMenu]=useState("대시보드(건축공사팀)");
  const [schedules,setSchedules]=useState([]);
  const [trips,setTrips]=useState([]);
  const [tasks,setTasks]=useState([]);
  const [syncStatus,setSyncStatus]=useState("동기화됨");
  const [lastSync,setLastSync]=useState(new Date());
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [showSchedModal,setShowSchedModal]=useState(false);
  const [showTaskModal,setShowTaskModal]=useState(false);
  const [showTripModal,setShowTripModal]=useState(false);
  const [editingSched,setEditingSched]=useState(null);
  const [editingTask,setEditingTask]=useState(null);
  const [editingTrip,setEditingTrip]=useState(null);
  const [confirmDlg,setConfirmDlg]=useState(null);
  const [currentMonth,setCurrentMonth]=useState(new Date());
  const [selectedSched,setSelectedSched]=useState(null);
  const initialized=useRef(false);
  const polling=useRef(null);
  const [appLoading,setAppLoading]=useState(false);
  const [currentMonth2,setCurrentMonth2]=useState(new Date());
  const [selectedSched2,setSelectedSched2]=useState(null);
  const [leaves,setLeaves]=useState([]);
  const [sites,setSites]=useState([]);
  const [orgNodes,setOrgNodes]=useState([]);
  const [personnel,setPersonnel]=useState([]);
  const [siteMinStaff,setSiteMinStaff]=useState([]);
  const [sitePMLocked,setSitePMLocked]=useState(true);
  const [hqDashLocked,setHqDashLocked]=useState(true);
  const [hqDashPwInput,setHqDashPwInput]=useState("");
  const [hqDashPwError,setHqDashPwError]=useState("");
  const [sitepmPwInput,setSitepmPwInput]=useState("");
  const [sitepmPwError,setSitepmPwError]=useState("");
  const [currentMonth3,setCurrentMonth3]=useState(new Date());
  const [selectedSched3,setSelectedSched3]=useState(null);
  const [showLeaveModal,setShowLeaveModal]=useState(false);
  const [editingLeave,setEditingLeave]=useState(null);

  const todayStr=getLocalDateStr(new Date());
  const weekEndDate=new Date(); weekEndDate.setDate(weekEndDate.getDate()+6);
  const weekEndStr=getLocalDateStr(weekEndDate);

  const lastLocalChange=useRef(0); // 마지막 로컬 변경 시각 (ms)
  const orgLocalChange=useRef(0);  // org_nodes 전용 보호 타임스탬프
  const pendingOrgIds=useRef(new Set()); // 서버 저장 중인 노드 id (폴링 덮어쓰기 방지)

  async function initialize(){
    if(initialized.current)return;
    setAppLoading(true);
    try{
      setSyncStatus("연결 중");
      // apiInit은 백그라운드 (시트 생성은 오래 걸릴 수 있음)
      Promise.all([apiInit("schedules",SCHED_HEADERS),apiInit("trips",TRIP_HEADERS),apiInit("tasks",TASK_HEADERS),apiInit("leaves",LEAVE_HEADERS),apiInit("sites",SITE_HEADERS),apiInit("org_nodes",ORG_HEADERS),apiInit("personnel",PERSONNEL_HEADERS)]).catch(()=>{});
      await loadData();
      initialized.current=true;
    }catch(e){
      setSyncStatus("오류");
      initialized.current=true;
    }
    setAppLoading(false);
  }

  async function loadData(){
    const reqAt=Date.now();
    try{
      const [s,tr,t,lv,sv,on,pr,ms]=await Promise.all([apiGet("schedules"),apiGet("trips"),apiGet("tasks"),apiGet("leaves"),apiGet("sites"),apiGet("org_nodes"),apiGet("personnel"),apiGet("site_min_staff")]);
      // 요청 시작 후 로컬 변경이 있으면 무시 (내가 방금 저장한 데이터를 서버가 덮어쓰지 않도록)
      if(lastLocalChange.current>=reqAt)return;
      // JSON 문자열 비교로 실제 변경 시에만 setState → 불필요한 리렌더 방지
      setSchedules(prev=>{const next=JSON.stringify(s);return JSON.stringify(prev)===next?prev:s;});
      setTrips(prev=>{const next=JSON.stringify(tr);return JSON.stringify(prev)===next?prev:tr;});
      setTasks(prev=>{const next=JSON.stringify(t);return JSON.stringify(prev)===next?prev:t;});
      setLeaves(prev=>{const next=JSON.stringify(lv);return JSON.stringify(prev)===next?prev:lv;});
      setSites(prev=>{const next=JSON.stringify(sv);return JSON.stringify(prev)===next?prev:sv;});
      // orgNodes: pendingOrgIds에 없는 노드만 서버 데이터로 업데이트
      // pendingOrgIds = 현재 API 저장 중인 노드 → 로컬 값 보존
      {
        const deduped=on.filter((n,i,arr)=>arr.findIndex(x=>x.id===n.id)===i);
        if(orgLocalChange.current<reqAt){
          setOrgNodes(prev=>{
            if(pendingOrgIds.current.size===0){
              // 저장 중인 노드 없음 → 서버 데이터 그대로 사용
              const next=JSON.stringify(deduped);
              return JSON.stringify(prev)===next?prev:deduped;
            }
            // 저장 중인 노드는 로컬 값 유지, 나머지는 서버 값 사용
            const serverMap=new Map(deduped.map(n=>[n.id,n]));
            const merged=deduped.map(n=>
              pendingOrgIds.current.has(n.id)
                ? (prev.find(p=>p.id===n.id)||n)  // 로컬 값 유지
                : n                                // 서버 값 사용
            );
            // 서버에 없지만 pending 중인 노드(새로 추가된 노드) 보존
            prev.forEach(p=>{
              if(pendingOrgIds.current.has(p.id)&&!serverMap.has(p.id)){
                merged.push(p);
              }
            });
            const next=JSON.stringify(merged);
            return JSON.stringify(prev)===next?prev:merged;
          });
        }
      }
      setPersonnel(prev=>{const next=JSON.stringify(pr);return JSON.stringify(prev)===next?prev:pr;});
      setSiteMinStaff(prev=>{const next=JSON.stringify(ms);return JSON.stringify(prev)===next?prev:(ms||[]);});
      setLastSync(new Date()); setSyncStatus("동기화됨");
    }catch(e){setSyncStatus("오류");}
  }

  // 로컬 변경 시 버전 올림 → 진행 중인 폴링 응답을 무효화
  function bumpLocal(){ lastLocalChange.current=Date.now(); setSyncStatus("저장중"); }

  // ── App 레벨 org_nodes 핸들러 ──
  // ── org_nodes 핸들러 (안정적 버전) ──
  // 단건 upsert: 낙관적 업데이트 + API 저장 + 폴링 차단
  function onOrgSave(node){
    const row={...node};
    const skipApi=!!row._skipApi;
    const skipBlock=!!row._skipBlock; // sort_order 저장 시 BLOCK 없음
    const skipPending=!!row._skipPending; // sort_order 저장 시 pending/30초보호 없음
    delete row._skipApi;
    delete row._skipBlock;
    delete row._skipPending;
    const BLOCK=skipBlock?0:60000;
    setOrgNodes(prev=>{
      const exists=prev.find(n=>n.id===row.id);
      const updated=exists?prev.map(n=>n.id===row.id?{...n,...row}:n):[...prev,row];
      return updated.filter((n,i,arr)=>arr.findIndex(x=>x.id===n.id)===i);
    });
    if(!skipBlock){
      orgLocalChange.current=Math.max(orgLocalChange.current,Date.now()+BLOCK);
      lastLocalChange.current=Math.max(lastLocalChange.current,Date.now()+BLOCK);
    }
    if(!skipApi){
      if(!skipPending) pendingOrgIds.current.add(row.id);
      apiUpsert("org_nodes",row)
        .then(()=>{
          if(!skipPending){
            pendingOrgIds.current.delete(row.id);
            // sort_order 저장이 아닐 때만 30초 추가 보호
            orgLocalChange.current=Math.max(orgLocalChange.current,Date.now()+30000);
            lastLocalChange.current=Math.max(lastLocalChange.current,Date.now()+30000);
          }
        })
        .catch(()=>{
          if(!skipPending) pendingOrgIds.current.delete(row.id);
          setSyncStatus("오류");
        });
    }
  }
  // 단건 삭제
  function onOrgDelete(ids){
    const idArr=Array.isArray(ids)?ids:[ids];
    const BLOCK=60000;
    setOrgNodes(prev=>prev.filter(n=>!idArr.includes(n.id)));
    orgLocalChange.current=Math.max(orgLocalChange.current,Date.now()+BLOCK);
    lastLocalChange.current=Math.max(lastLocalChange.current,Date.now()+BLOCK);
    Promise.all(idArr.map(id=>apiDelete("org_nodes",id)))
      .then(()=>{
        orgLocalChange.current=Math.max(orgLocalChange.current,Date.now()+60000);
        lastLocalChange.current=Math.max(lastLocalChange.current,Date.now()+60000);
      })
      .catch(()=>setSyncStatus("오류"));
  }
  function onOrgSaveBump(){bumpLocal();}
  // 현장 조직도 전체 교체 - replace_all 단일 API 호출 (안정적)
  async function onOrgReplaceForSite(siteId,newSiteNodes){
    // ① 폴링 완전 중단
    clearInterval(polling.current);
    polling.current=null;
    setSyncStatus("저장중");
    // ② 로컬 state 즉시 교체
    setOrgNodes(prev=>{
      const others=prev.filter(n=>n.site_id!==siteId);
      return [...others,...newSiteNodes];
    });
    lastLocalChange.current=Date.now()+600000;
    orgLocalChange.current=Date.now()+600000;
    try{

      let otherNodes=[];
      setOrgNodes(prev=>{ otherNodes=prev.filter(n=>n.site_id!==siteId); return prev; });
      await new Promise(r=>setTimeout(r,0)); // React 배치 플러시
      const combined=[...otherNodes,...newSiteNodes];
      // ④ POST replaceAll 한번에 전송 (서버측 setValues 원자적 처리)
      const res=await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({sheet:"org_nodes",action:"replace_all",headers:ORG_HEADERS,rows:combined})
      });
      const result=await res.json().catch(()=>({ok:false}));
      if(!result.ok) throw new Error("replace_all 실패");
      setSyncStatus("동기화됨");
    }catch(e){
      // POST 실패 시 순차 upsert fallback
      console.warn("POST replaceAll 실패, fallback:", e.message);
      try{
        const r2=await fetch(`${API_URL}?sheet=org_nodes`);
        const d2=await r2.json();
        const existIds=(d2.ok&&d2.data?d2.data:[])
          .filter(n=>n.site_id===siteId).map(n=>n.id).filter(Boolean);
        for(const id of existIds){
          for(let t=0;t<3;t++){
            try{ await apiDelete("org_nodes",id); break; }
            catch(e2){ await new Promise(r=>setTimeout(r,300)); }
          }
          await new Promise(r=>setTimeout(r,80));
        }
        for(const node of newSiteNodes){
          for(let t=0;t<3;t++){
            try{ await apiUpsert("org_nodes",node); break; }
            catch(e2){ await new Promise(r=>setTimeout(r,300)); }
          }
          await new Promise(r=>setTimeout(r,80));
        }
        setSyncStatus("동기화됨");
      }catch(e2){
        setSyncStatus("오류");
      }
    }finally{
      pendingOrgIds.current.clear();
      orgLocalChange.current=Date.now()+30000;
      lastLocalChange.current=Date.now()+5000;
      polling.current=setInterval(loadData,3000);
    }

      let otherNodes=[];

      await new Promise(r=>setTimeout(r,0));
      const combined=[...otherNodes,...newHqNodes];
      const res=await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body:JSON.stringify({sheet:"org_nodes",action:"replace_all",headers:ORG_HEADERS,rows:combined})
      });
      const result=await res.json().catch(()=>({ok:false}));
      if(!result.ok) throw new Error("replace_all 실패");
      setSyncStatus("동기화됨");
    }catch(e){
      // fallback: 순차 삭제 + upsert
      console.warn("POST replaceAll 실패, 순차로 fallback:",e);
      try{
        const r2=await fetch(`${API_URL}?sheet=org_nodes`);
        const d2=await r2.json();
        const existHqIds=(d2.ok&&d2.data?d2.data:[])
          .filter(n=>n.site_id==="__hq__").map(n=>n.id).filter(Boolean);
        let saved=0;
        for(const id of existHqIds){
          for(let t=0;t<3;t++){

            catch(e2){ await new Promise(r=>setTimeout(r,500)); }

  async function handleLogin(){
    const n=nameInput.trim();
    if(!n)return;
    setLoginLoading(true);
    setLoginError("");
    try{
      // API URL 미설정 체크
      if(!API_URL||API_URL==="YOUR_APPS_SCRIPT_URL_HERE"){
        setLoginError("⚠️ API URL이 설정되지 않았습니다. index.html의 API_URL을 실제 주소로 교체해 주세요.");
        setLoginLoading(false);return;
      }
      // 10초 타임아웃 fetch
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),10000);
      let json;
      try{
        const membersRes=await fetch(`${API_URL}?sheet=members`,{signal:controller.signal});
        clearTimeout(timer);
        json=await membersRes.json();
      }catch(fetchErr){
        clearTimeout(timer);
        if(fetchErr.name==="AbortError"){
          setLoginError("⚠️ 서버 응답 시간이 초과됐습니다. 잠시 후 다시 시도해 주세요.");
        } else {
          setLoginError(`⚠️ 서버 연결 실패: ${fetchErr.message}`);
        }
        setLoginLoading(false);return;
      }
      if(!json.ok){
        setLoginError(`⚠️ 서버 오류: ${json.error||"알 수 없는 오류"}`);
        setLoginLoading(false);return;
      }
      const members=json.data||[];
      if(members.length===0){
        setLoginError("⚠️ members 시트가 비어있습니다. Google Sheets에서 이름을 추가하세요.");
        setLoginLoading(false);return;
      }
      const allowed=members.map(m=>String(m.name||"").trim()).filter(Boolean);
      if(!allowed.includes(n)){
        setLoginError(`❌ "${n}"은(는) 등록되지 않은 이름입니다. 관리자에게 문의하세요.`);
        setLoginLoading(false);return;
      }
      // 인증 성공 → 즉시 화면 전환
      try{sessionStorage.setItem("ts-name",n);}catch{}
      setLoginLoading(false);
      setMyName(n);
    }catch(e){
      setLoginError(`⚠️ 오류: ${e.message}`);
      setLoginLoading(false);
    }
  }

          {activeMenu==="캘린더(주요일정)"&&<CalendarView schedules={schedules} currentMonth={currentMonth} setCurrentMonth={setCurrentMonth} todayStr={todayStr} selectedSched={selectedSched} setSelectedSched={setSelectedSched} onDateClick={d=>{setEditingSched(null);setShowSchedModal({prefillDate:d});}} onEditSched={s=>{setEditingSched(s);setShowSchedModal(true);}} onDeleteSched={deleteSched} isMobile={isMobile}/>}
          {activeMenu==="캘린더(출장일정)"&&<CalendarView schedules={trips} currentMonth={currentMonth2} setCurrentMonth={setCurrentMonth2} todayStr={todayStr} selectedSched={selectedSched2} setSelectedSched={setSelectedSched2} onDateClick={d=>{setEditingTrip(null);setShowTripModal({prefillDate:d});}} onEditSched={s=>{setEditingTrip(s);setShowTripModal(true);}} onDeleteSched={deleteTrip} showOwner={true} showPartColor={true} isMobile={isMobile}/>}
          {activeMenu==="캘린더(연차일정)"&&<CalendarView schedules={leaves} currentMonth={currentMonth3} setCurrentMonth={setCurrentMonth3} todayStr={todayStr} selectedSched={selectedSched3} setSelectedSched={setSelectedSched3} onDateClick={d=>{setEditingLeave(null);setShowLeaveModal({prefillDate:d});}} onEditSched={s=>{setEditingLeave(s);setShowLeaveModal(true);}} onDeleteSched={deleteLeave} showOwnerColor={true} isMobile={isMobile}/>}
          {activeMenu==="현장관리플랫폼"&&(sitePMLocked
  ?<div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:400,background:"#F4F2FF"}}>
    <div style={{background:"#fff",borderRadius:20,padding:"44px 48px",boxShadow:"0 4px 24px rgba(108,99,255,0.12)",width:340,textAlign:"center",border:"1px solid #EDE9FE"}}>
      <div style={{width:60,height:60,borderRadius:18,background:"linear-gradient(135deg,#9F7AEA,#C4B5FD)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 16px"}}>🔒</div>
      <h2 style={{margin:"0 0 6px",fontSize:18,fontWeight:800,color:"#2D3748"}}>현장관리플랫폼</h2>
      <p style={{color:"#718096",fontSize:13,margin:"0 0 24px"}}>보안구역입니다. 암호를 입력하세요.</p>
      <input
        type="password"
        value={sitepmPwInput}
        onChange={e=>{setSitepmPwInput(e.target.value);setSitepmPwError("");}}
        onKeyDown={e=>{if(e.key==="Enter"){if(sitepmPwInput==="dongbu"){setSitePMLocked(false);setSitepmPwInput("");}else{setSitepmPwError("암호가 올바르지 않습니다.");}}} }
        placeholder="암호 입력"
        autoFocus
        style={{width:"100%",background:"#EEF2F7",border:`1px solid ${sitepmPwError?"#F87171":"#6C63FF66"}`,borderRadius:10,padding:"11px 14px",fontSize:15,color:"#2D3748",outline:"none",boxSizing:"border-box",marginBottom:sitepmPwError?8:14,textAlign:"center",letterSpacing:4}}/>
      {sitepmPwError&&<p style={{color:"#F87171",fontSize:12,margin:"0 0 12px"}}>{sitepmPwError}</p>}
      <button onClick={()=>{if(sitepmPwInput==="dongbu"){setSitePMLocked(false);setSitepmPwInput("");}else{setSitepmPwError("암호가 올바르지 않습니다.");}}}
        style={{width:"100%",background:"linear-gradient(90deg,#9F7AEA,#B794F4)",border:"none",borderRadius:10,padding:12,fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer"}}>

  </div>
  :<SitePMBoard sites={sites} onSave={saveSite} onDelete={deleteSite} orgNodes={orgNodes}
  onOrgSave={onOrgSave} onOrgDelete={onOrgDelete} onOrgSaveBump={onOrgSaveBump} onOrgReplaceForSite={onOrgReplaceForSite}
  personnel={personnel} onPersonnelSave={onPersonnelSave} onPersonnelDelete={onPersonnelDelete}
  siteMinStaff={siteMinStaff} onMinStaffSave={onMinStaffSave} isMobile={isMobile}
/>
)}

        </div>
      </div>

      {/* 모달들 */}
      {showSchedModal&&<SchedModal initial={editingSched||(showSchedModal?.prefillDate?{...newSchedDef,start_date:showSchedModal.prefillDate,end_date:showSchedModal.prefillDate}:newSchedDef)} onSave={saveSched} onClose={()=>{setShowSchedModal(false);setEditingSched(null);}} isEdit={!!editingSched}/>}
      {showTripModal&&<SchedModal initial={editingTrip||(showTripModal?.prefillDate?{...newTripDef,start_date:showTripModal.prefillDate,end_date:showTripModal.prefillDate}:newTripDef)} onSave={saveTrip} onClose={()=>{setShowTripModal(false);setEditingTrip(null);}} isEdit={!!editingTrip} modalTitle="출장일정"/>}
      {showLeaveModal&&<SchedModal initial={editingLeave||(showLeaveModal?.prefillDate?{...newLeaveDef,start_date:showLeaveModal.prefillDate,end_date:showLeaveModal.prefillDate}:newLeaveDef)} onSave={saveLeave} onClose={()=>{setShowLeaveModal(false);setEditingLeave(null);}} isEdit={!!editingLeave} modalTitle="연차일정"/>}

              <button onClick={()=>setConfirmDlg(null)} style={{...btn("#CBD5E0","#4A5568"),padding:"10px 24px"}}>취소</button>
              <button onClick={()=>{confirmDlg.onConfirm();setConfirmDlg(null);}} style={{...btn("#F87171"),padding:"10px 24px"}}>삭제</button>

          {key:"업무 관리",icon:"✓",label:"업무"},
          {key:"대시보드(현장관리플랫폼)",icon:"👥",label:"현장DB"},
          {key:"현장관리플랫폼",icon:"🏗",label:"현장"},
        ].map(m=>(

            <span style={{fontSize:9,fontWeight:activeMenu===m.key?700:400,textAlign:"center",lineHeight:1.2}}>{m.label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 대시보드 ──────────────────────────────────────────
function Dashboard({schedules,trips,tasks,sites=[],todaySchedules,weekSchedules,weekTrips,urgentSchedules,inProgressTasks,overdueTasks,setActiveMenu,todayStr,weekEndStr,onSchedClick,onTripClick,isMobile=false}){
  return (
    <div>
      {/* 통계 카드 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"repeat(2,1fr)":"repeat(6,1fr)",gap:isMobile?10:16,marginBottom:isMobile?16:24}}>
        {[
          {label:"오늘 일정",value:todaySchedules.length,icon:"📅",color:"#6C63FF",bg:"#EDE9FE",border:"#C4B5FD",onClick:()=>setActiveMenu("캘린더(주요일정)")},
          {label:"이번주 일정",value:weekSchedules.length,icon:"🗓",color:"#9D174D",bg:"#FDF2F8",border:"#FBCFE8",onClick:()=>setActiveMenu("캘린더(주요일정)")},
          {label:"이번주 출장일정",value:(weekTrips||[]).length,icon:"✈️",color:"#C2410C",bg:"#FFF7ED",border:"#FED7AA",onClick:()=>setActiveMenu("캘린더(출장일정)")},
          {label:"할 일",value:tasks.filter(t=>t.status==="할 일").length,icon:"📋",color:"#4338CA",bg:"#EEF2FF",border:"#C7D2FE",onClick:()=>setActiveMenu("업무 관리")},
          {label:"진행 중 업무",value:inProgressTasks.length,icon:"⚡",color:"#0F766E",bg:"#F0FDFA",border:"#99F6E4",onClick:()=>setActiveMenu("업무 관리")},
          {label:"기한 초과 업무",value:overdueTasks.length,icon:"🚨",color:"#DC2626",bg:overdueTasks.length>0?"#FFF5F5":"#FEF2F2",border:overdueTasks.length>0?"#FCA5A5":"#FECACA",onClick:()=>setActiveMenu("업무 관리"),alert:overdueTasks.length>0},
        ].map(s=>(
          <div key={s.label} onClick={s.onClick}
            style={{background:s.bg,border:`1.5px solid ${s.border}`,borderRadius:14,padding:"20px 22px",cursor:s.onClick?"pointer":"default",transition:"transform 0.2s, box-shadow 0.2s",position:"relative",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}
            onMouseEnter={e=>{if(s.onClick){e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 6px 20px rgba(0,0,0,0.10)";}}}
            onMouseLeave={e=>{e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="0 1px 4px rgba(0,0,0,0.06)";}}>
            {s.alert&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,#F87171,#FF4D6D)",borderRadius:"14px 14px 0 0"}}/>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <p style={{margin:"0 0 8px",fontSize:12,fontWeight:600,color:"#718096"}}>{s.label}</p>
                <p style={{margin:0,fontSize:28,fontWeight:800,color:s.color}}>{s.value}</p>
              </div>
              <div style={{width:44,height:44,borderRadius:12,background:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>{s.icon}</div>
            </div>
          </div>
        ))}
      </div>

      {/* 기한 초과 배너 */}
      {overdueTasks.length>0&&(
        <div style={{background:"linear-gradient(90deg,rgba(248,113,113,0.08),rgba(255,77,109,0.05))",border:"1px solid #FEB2B2",borderRadius:14,padding:"14px 20px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:18}}>🚨</span>
            <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#F87171"}}>기한 초과 업무 {overdueTasks.length}건 — 즉시 확인이 필요합니다</h3>
            <button onClick={()=>setActiveMenu("업무 관리")} style={{marginLeft:"auto",...btn("#F87171"),fontSize:11,padding:"4px 12px"}}>업무 관리로 이동 →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {overdueTasks.slice(0,5).map(t=>{
              const pc=PART_COLORS[t.part];
              const sc=STATUS_COLORS[t.status]||STATUS_COLORS["할 일"];
              const daysOver=Math.floor((new Date()-new Date(t.due_date+"T00:00:00"))/(1000*60*60*24));
              return <div key={t.id} style={{display:"grid",gridTemplateColumns:"120px 1fr 110px 130px 80px",gap:10,alignItems:"center",background:"rgba(0,0,0,0.05)",borderRadius:8,padding:"8px 14px",borderLeft:"3px solid #F87171"}}>
                {t.part?<span style={{fontSize:10,padding:"2px 8px",borderRadius:10,background:pc?.bg||"#CBD5E0",color:pc?.text||"#4A5568",border:`1px solid ${pc?.border||"#A0AEC0"}`,fontWeight:700}}>{t.part}</span>:<span style={{fontSize:10,color:"#A0AEC0"}}>—</span>}
                <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</p>
                <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <div style={{width:18,height:18,borderRadius:"50%",background:getAvatarColor(t.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{(t.owner_name||"?")[0]}</div>
                  <span style={{fontSize:12,color:"#6C63FF",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.owner_name}</span>
                </div>
                <span style={{fontSize:11,color:"#F87171",fontWeight:700}}>{t.due_date}<span style={{fontSize:10,color:"#FC8181",marginLeft:3}}>({getDayOfWeek(t.due_date)}) {daysOver}일 초과</span></span>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:6,background:sc.bg,color:sc.text,fontWeight:700,border:`1px solid ${sc.border}`}}>{t.status}</span>
              </div>;
            })}
            {overdueTasks.length>5&&<p style={{margin:0,fontSize:11,color:"#F87171",textAlign:"center",paddingTop:4}}>외 {overdueTasks.length-5}건 더...</p>}
          </div>
        </div>
      )}

      {/* 준공 임박 현장 배너 */}
      {(()=>{
        const today=new Date();
        const urgent=(sites||[]).filter(s=>{
          if(!s.completion)return false;
          const diff=Math.ceil((new Date(s.completion+"T00:00:00")-today)/(1000*60*60*24));
          return diff>=0&&diff<=30;
        }).sort((a,b)=>a.completion.localeCompare(b.completion));
        if(urgent.length===0)return null;
        return <div style={{background:"linear-gradient(90deg,rgba(245,158,11,0.08),rgba(248,113,113,0.05))",border:"1px solid #FBBF24",borderRadius:14,padding:"14px 20px",marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:18}}>🏗</span>
            <h3 style={{margin:0,fontSize:14,fontWeight:800,color:"#D97706"}}>준공 임박 현장 {urgent.length}건 — D-30일 이내</h3>
            <button onClick={()=>setActiveMenu("현장관리플랫폼")} style={{marginLeft:"auto",...btn("#F59E0B"),fontSize:11,padding:"4px 12px"}}>현장 현황 →</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {urgent.map(s=>{
              const days=Math.ceil((new Date(s.completion+"T00:00:00")-today)/(1000*60*60*24));
              return <div key={s.id} style={{display:"flex",alignItems:"center",gap:12,background:"#fff",borderRadius:10,padding:"10px 16px",border:"1px solid #FDE68A",borderLeft:"4px solid #F59E0B"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:getAvatarColor(s.pm),display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:800,color:"#fff",flexShrink:0}}>{(s.pm||"?")[0]}</div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{margin:0,fontSize:14,fontWeight:800,color:"#1A1A2E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</p>
                  <p style={{margin:0,fontSize:12,color:"#718096"}}>담당 PM: <strong style={{color:"#6C63FF"}}>{s.pm}</strong>{s.location&&<span style={{marginLeft:8,color:"#A0AEC0"}}>📍 {s.location}</span>}</p>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <p style={{margin:0,fontSize:13,fontWeight:800,color:days<=7?"#F87171":"#D97706"}}>D-{days}</p>
                  <p style={{margin:0,fontSize:11,color:"#A0AEC0"}}>{s.completion}</p>
                </div>
              </div>;
            })}
          </div>
        </div>;
      })()}

      {/* 하단 섹션 - 6개 카드를 하나의 그리드로 정렬 */}
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr 1fr",gap:isMobile?12:20}}>
        <SecCard title="오늘 일정" accent="#6C63FF">{todaySchedules.length===0?<Empty text="오늘 일정 없음"/>:todaySchedules.map(s=><SchedRow key={s.id} s={s} onClick={onSchedClick}/>)}</SecCard>
        <SecCard title="이번주 일정 (주요)" accent="#F9A8D4">{weekSchedules.length===0?<Empty text="이번주 일정 없음"/>:weekSchedules.map(s=><SchedRow key={s.id} s={s} onClick={onSchedClick}/>)}</SecCard>
        <SecCard title="이번주 출장일정 ✈️" accent="#FB923C">{(weekTrips||[]).length===0?<Empty text="이번주 출장일정 없음"/>:(weekTrips||[]).map(s=><SchedRow key={s.id} s={s} onClick={onTripClick}/>)}</SecCard>
        <SecCard title="할 일 (1주일 이내)" accent="#818CF8">{sortTasks(tasks.filter(t=>t.status==="할 일"&&(!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)))).length===0?<Empty text="1주일 이내 할 일 없음"/>:sortTasks(tasks.filter(t=>t.status==="할 일"&&(!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)))).map(t=><TaskRow key={t.id} t={t}/>)}</SecCard>
        <SecCard title="진행 중 업무 (1주일 이내)" accent="#2EC4B6">{inProgressTasks.filter(t=>!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)).length===0?<Empty text="1주일 이내 진행 중 업무 없음"/>:inProgressTasks.filter(t=>!t.due_date||(t.due_date>=todayStr&&t.due_date<=weekEndStr)).map(t=><TaskRow key={t.id} t={t}/>)}</SecCard>
        <SecCard title="업무 현황" accent="#F9A8D4">
          {TASK_STATUSES.map(st=>{const count=tasks.filter(t=>t.status===st).length;const pct=tasks.length?Math.round(count/tasks.length*100):0;const c=STATUS_COLORS[st];return <div key={st} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,color:c.text}}>{st}</span><span style={{fontSize:12,color:"#718096"}}>{count}개 ({pct}%)</span></div><div style={{height:6,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:c.border,borderRadius:3,transition:"width 0.5s"}}/></div></div>;})}
        </SecCard>
      </div>
    </div>
  );
}
function SecCard({title,accent,children}){return <div style={{background:"#FFFFFF",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`2px solid ${accent}33`,borderRadius:14,padding:"18px 20px"}}><h3 style={{margin:"0 0 14px",fontSize:15,fontWeight:800,color:accent}}>{title}</h3>{children}</div>;}
function Empty({text}){return <p style={{color:"#A0AEC0",fontSize:13,textAlign:"center",padding:"12px 0"}}>{text}</p>;}
function SchedRow({s,onClick}){const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;return <div onClick={()=>onClick&&onClick(s)} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 6px",borderBottom:"1px solid #EEF2F7",borderRadius:6,cursor:onClick?"pointer":"default",transition:"background 0.15s"}} onMouseEnter={e=>{if(onClick)e.currentTarget.style.background="rgba(108,99,255,0.06)";}} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><div style={{width:8,height:8,borderRadius:"50%",background:pc.bg,flexShrink:0}}/><div style={{flex:1,minWidth:0}}><p style={{margin:0,fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p><p style={{margin:0,fontSize:11,color:"#718096"}}>{s.owner_name}</p><p style={{margin:"2px 0 0",fontSize:11,color:"#4A5568"}}>{s.start_date}<span style={{color:"#9F7AEA",marginLeft:3}}>({getDayOfWeek(s.start_date)})</span>{s.start_time&&<span style={{color:"#6C63FF"}}> {s.start_time}</span>}{" → "}{s.end_date}<span style={{color:"#9F7AEA",marginLeft:3}}>({getDayOfWeek(s.end_date)})</span>{s.end_time&&<span style={{color:"#6C63FF"}}> {s.end_time}</span>}</p></div><div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}><span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:pc.bg,color:pc.text}}>{s.priority==="high"?"높음":s.priority==="medium"?"중간":"낮음"}</span>{onClick&&<span style={{fontSize:10,color:"#718096"}}>→</span>}</div></div>;}
function TaskRow({t}){const c=STATUS_COLORS[t.status]||STATUS_COLORS["할 일"];return <div style={{padding:"8px 0",borderBottom:"1px solid #EEF2F7"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}><span style={{fontSize:13,fontWeight:600,flex:1,paddingRight:8}}>{t.title}</span><span style={{fontSize:11,color:c.text,padding:"2px 7px",borderRadius:5,background:c.bg,flexShrink:0}}>{t.status}</span></div>{t.owner_name&&<div style={{display:"flex",alignItems:"center",gap:5,marginBottom:4}}><div style={{width:16,height:16,borderRadius:"50%",background:getAvatarColor(t.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{t.owner_name[0]}</div><span style={{fontSize:11,color:"#6C63FF",fontWeight:600}}>{t.owner_name}</span></div>}<div style={{display:"flex",gap:10,margin:"3px 0 4px",flexWrap:"wrap"}}>{t.start_date&&<p style={{margin:0,fontSize:10,color:"#4A5568"}}>🗓 시작: {t.start_date} ({getDayOfWeek(t.start_date)})</p>}{t.due_date&&<p style={{margin:0,fontSize:10,color:"#FB923C"}}>📅 완료예정: {t.due_date} ({getDayOfWeek(t.due_date)})</p>}</div><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,height:5,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${t.progress}%`,background:c.border,borderRadius:3}}/></div><span style={{fontSize:11,color:"#718096",flexShrink:0}}>{t.progress}%</span></div></div>;}

// ── 일정 관리 (리스트형) ──────────────────────────────
function ScheduleBoard({schedules,onEdit,onDelete,isMobile=false}){
  const [priority,setPriority]=useState("all");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [nameFilter,setNameFilter]=useState("");
  const [showFilter,setShowFilter]=useState(false);
  const sorted=[...schedules].sort((a,b)=>{const d=a.start_date.localeCompare(b.start_date);if(d!==0)return d;return(a.start_time||"00:00").localeCompare(b.start_time||"00:00");});
  const filtered=sorted.filter(s=>{
    if(priority!=="all"&&s.priority!==priority)return false;
    if(dateFrom&&s.start_date<dateFrom)return false;
    if(dateTo&&s.start_date>dateTo)return false;
    if(nameFilter&&!s.owner_name?.toLowerCase().includes(nameFilter.toLowerCase()))return false;
    return true;
  });
  const hasFilter=priority!=="all"||dateFrom||dateTo||nameFilter;
  const grouped=filtered.reduce((acc,s)=>{const k=s.start_date;if(!acc[k])acc[k]=[];acc[k].push(s);return acc;},{});
  const groupedDates=Object.keys(grouped).sort();
  const DAY_NAMES=["일","월","화","수","목","금","토"];
  return <div>
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:isMobile?"nowrap":"wrap",alignItems:"center",overflowX:isMobile?"auto":"visible",paddingBottom:isMobile?4:0}}>
      {["all","high","medium","low"].map(f=>(
        <button key={f} onClick={()=>setPriority(f)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:priority===f?"#6C63FF":"#EEF2F7",color:priority===f?"#fff":"#4A5568"}}>
          {f==="all"?"전체":f==="high"?"높음":f==="medium"?"중간":"낮음"}
        </button>
      ))}
      <button onClick={()=>setShowFilter(v=>!v)} style={{padding:"6px 14px",borderRadius:20,border:showFilter?"1px solid #6C63FF":"1px solid #CBD5E0",cursor:"pointer",fontSize:12,fontWeight:600,background:showFilter?"rgba(108,99,255,0.12)":"#EEF2F7",color:"#6C63FF"}}>
        🔍 필터{hasFilter?" ●":""}
      </button>
      <span style={{marginLeft:"auto",fontSize:12,color:"#718096"}}>총 {filtered.length}개</span>
    </div>
    {showFilter&&(
      <div style={{background:"#FFFFFF",border:"1px solid #CBD5E0",borderRadius:12,padding:"16px 20px",marginBottom:16,display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
        <div><label style={{display:"block",fontSize:11,color:"#4A5568",marginBottom:5,fontWeight:600}}>시작일 (이후)</label><input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={inp}/></div>
        <div><label style={{display:"block",fontSize:11,color:"#4A5568",marginBottom:5,fontWeight:600}}>시작일 (이전)</label><input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={inp}/></div>
        <div><label style={{display:"block",fontSize:11,color:"#4A5568",marginBottom:5,fontWeight:600}}>담당자 이름</label><input value={nameFilter} onChange={e=>setNameFilter(e.target.value)} placeholder="이름 검색..." style={inp}/></div>
        {hasFilter&&<div style={{gridColumn:"1/-1",textAlign:"right"}}><button onClick={()=>{setPriority("all");setDateFrom("");setDateTo("");setNameFilter("");}} style={{...btn("#CBD5E0","#F87171"),fontSize:11,padding:"4px 12px"}}>초기화</button></div>}
      </div>
    )}
    {!isMobile&&<div style={{background:"#F7FAFC",borderRadius:"10px 10px 0 0",padding:"10px 20px",display:"grid",gridTemplateColumns:"1fr 120px 150px 150px 80px 90px",gap:12,alignItems:"center",borderBottom:"1px solid #EEF2F7"}}>
      {["제목","담당자","시작","종료","중요도",""].map((h,i)=>(
        <span key={i} style={{fontSize:11,fontWeight:700,color:"#718096",textAlign:i===5?"right":"left"}}>{h}</span>
      ))}
    </div>}
    <div style={{background:"#FFFFFF",border:"1px solid #CBD5E0",borderTop:isMobile?"1px solid #CBD5E0":"none",borderRadius:isMobile?"10px":"0 0 10px 10px",overflow:"hidden"}}>
      {filtered.length===0&&<Empty text="조건에 맞는 일정이 없습니다."/>}
      {groupedDates.map((date,di)=>{
        const dayItems=grouped[date];
        const d=new Date(date+"T00:00:00");
        const dayName=DAY_NAMES[d.getDay()];
        const isWeekend=d.getDay()===0||d.getDay()===6;
        return <div key={date}>
          <div style={{padding:"8px 20px",background:"rgba(108,99,255,0.05)",borderBottom:"1px solid #EEF2F7",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:13,fontWeight:800,color:isWeekend?"#F87171":"#6C63FF"}}>{date}</span>
            <span style={{fontSize:12,color:isWeekend?"#F87171":"#718096",fontWeight:600}}>({dayName})</span>
            <span style={{fontSize:11,color:"#A0AEC0"}}>{dayItems.length}건</span>
          </div>
          {dayItems.map((s,si)=>{
            const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;
            const isLast=di===groupedDates.length-1&&si===dayItems.length-1;
            if(isMobile) return <div key={s.id} style={{padding:"12px 14px",borderBottom:isLast?"none":"1px solid #EEF2F7",position:"relative",background:"transparent"}}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:pc.bg,borderRadius:2}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,paddingLeft:8}}>
                <p style={{margin:0,fontSize:14,fontWeight:700,flex:1,paddingRight:8}}>{s.title}</p>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,background:pc.bg,color:pc.text,fontWeight:700,flexShrink:0}}>{s.priority==="high"?"높음":s.priority==="medium"?"중간":"낮음"}</span>
              </div>
              {s.description&&<p style={{margin:"0 0 5px 8px",fontSize:11,color:"#718096",whiteSpace:"pre-wrap"}}>{s.description}</p>}
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8,marginBottom:5}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:getAvatarColor(s.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{(s.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#6C63FF",fontWeight:600}}>{s.owner_name}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingLeft:8}}>
                <div style={{fontSize:11,color:"#4A5568"}}>
                  <span>{s.start_date}{s.start_time&&" "+s.start_time}</span>
                  <span style={{margin:"0 5px",color:"#A0AEC0"}}>→</span>
                  <span>{s.end_date}{s.end_time&&" "+s.end_time}</span>
                </div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>onEdit(s)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:11,padding:"4px 10px"}}>수정</button>
                  <button onClick={()=>onDelete(s.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:11,padding:"4px 10px"}}>삭제</button>
                </div>
              </div>
            </div>;
            return <div key={s.id}
              style={{display:"grid",gridTemplateColumns:"1fr 120px 150px 150px 80px 90px",gap:12,alignItems:"center",padding:"11px 20px",borderBottom:isLast?"none":"1px solid #EEF2F7",position:"relative",transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(108,99,255,0.04)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:pc.bg,borderRadius:2}}/>
              <div style={{minWidth:0,paddingLeft:8}}>
                <p style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</p>
                {s.description&&<p style={{margin:"2px 0 0",fontSize:11,color:"#718096",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.description}</p>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:getAvatarColor(s.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{(s.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#6C63FF",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.owner_name}</span>
              </div>
              <span style={{fontSize:12,color:"#2D3748"}}>{s.start_date}{s.start_time&&<span style={{color:"#6C63FF",marginLeft:4,fontSize:11}}>{s.start_time}</span>}</span>
              <span style={{fontSize:12,color:"#2D3748"}}>{s.end_date}{s.end_time&&<span style={{color:"#6C63FF",marginLeft:4,fontSize:11}}>{s.end_time}</span>}</span>
              <span style={{fontSize:10,padding:"3px 8px",borderRadius:6,background:pc.bg,color:pc.text,fontWeight:700,textAlign:"center"}}>{s.priority==="high"?"높음":s.priority==="medium"?"중간":"낮음"}</span>
              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                <button onClick={()=>onEdit(s)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:11,padding:"4px 8px"}}>수정</button>
                <button onClick={()=>onDelete(s.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:11,padding:"4px 8px"}}>삭제</button>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── 업무 관리 (리스트형) ──────────────────────────────
function TaskBoard({tasks,onEdit,onDelete,onStatusChange,isMobile=false}){
  const [activePart,setActivePart]=useState("전체");
  const [statusFilter,setStatusFilter]=useState("전체");

    .filter(t=>{
      if(activePart!=="전체"&&t.part!==activePart)return false;
      if(statusFilter!=="전체"&&t.status!==statusFilter)return false;
      if(nameFilter&&!t.owner_name?.toLowerCase().includes(nameFilter.toLowerCase()))return false;
      return true;
    })
    .sort((a,b)=>(a.due_date||"9999").localeCompare(b.due_date||"9999"));
  const grouped=visibleTasks.reduce((acc,t)=>{const k=t.part||"미분류";if(!acc[k])acc[k]=[];acc[k].push(t);return acc;},{});
  const groupOrder=activePart==="전체"?[...PARTS,"미분류"].filter(p=>grouped[p]):[activePart];
  const today=getLocalDateStr(new Date());
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:isMobile?"nowrap":"wrap",alignItems:"center",overflowX:isMobile?"auto":"visible",paddingBottom:isMobile?4:0}}>
      {["전체",...PARTS].map(p=>{
        const pc=PART_COLORS[p];
        const count=p==="전체"?tasks.length:tasks.filter(t=>t.part===p).length;
        return <button key={p} onClick={()=>setActivePart(p)} style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,border:`1px solid ${activePart===p?(pc?.border||"#6C63FF"):"#CBD5E0"}`,background:activePart===p?(pc?.bg||"rgba(108,99,255,0.3)"):"#EEF2F7",color:activePart===p?(pc?.text||"#fff"):"#4A5568",display:"flex",alignItems:"center",gap:5}}>{p}<span style={{fontSize:10,opacity:0.7}}>({count})</span></button>;
      })}
    </div>
    <div style={{display:"flex",gap:isMobile?6:8,marginBottom:isMobile?12:16,flexWrap:"wrap",alignItems:"center"}}>
      {["전체",...TASK_STATUSES].map(s=>{
        const c=STATUS_COLORS[s];
        return <button key={s} onClick={()=>setStatusFilter(s)} style={{padding:"5px 12px",borderRadius:20,cursor:"pointer",fontSize:11,fontWeight:600,border:"none",background:statusFilter===s?(c?.border||"#6C63FF"):"#EEF2F7",color:statusFilter===s?"#fff":"#4A5568"}}>{s}</button>;
      })}
      <input value={nameFilter} onChange={e=>setNameFilter(e.target.value)} placeholder="🔍 담당자 검색" style={{...inp,width:160,fontSize:12,padding:"5px 12px",marginLeft:"auto"}}/>
      <span style={{fontSize:12,color:"#718096"}}>총 {visibleTasks.length}건</span>
    </div>

                  <p style={{margin:"4px 0 0",fontSize:14,fontWeight:700,lineHeight:1.3}}>{task.title}</p>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={()=>onEdit(task)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:10,padding:"3px 8px"}}>수정</button>
                  <button onClick={()=>onDelete(task.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:10,padding:"3px 8px"}}>삭제</button>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8,marginBottom:5}}>
                <div style={{width:18,height:18,borderRadius:"50%",background:getAvatarColor(task.owner_name),display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:700,color:"#fff",flexShrink:0}}>{(task.owner_name||"?")[0]}</div>
                <span style={{fontSize:12,color:"#6C63FF",fontWeight:600}}>{task.owner_name}</span>
                {task.start_date&&<span style={{fontSize:10,color:"#4A5568",marginLeft:4}}>시작 {task.start_date}</span>}
                {isOverdue&&<span style={{fontSize:10,color:"#F87171",fontWeight:700}}>⚠ 기한초과</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingLeft:8}}>
                <div style={{flex:1,height:6,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${task.progress}%`,background:sc.border,borderRadius:3}}/>
                </div>
                <span style={{fontSize:10,color:sc.border,fontWeight:700,flexShrink:0,minWidth:28}}>{task.progress}%</span>
                <select value={task.status} onChange={e=>onStatusChange(task.id,e.target.value)}
                  style={{fontSize:10,padding:"3px 6px",borderRadius:6,border:`1px solid ${sc.border}`,background:sc.bg,color:sc.text,fontWeight:700,cursor:"pointer",outline:"none"}}>
                  {TASK_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}

              </div>
            </div>;
            return <div key={task.id}
              style={{display:"grid",gridTemplateColumns:"130px 1fr 110px 110px 110px 90px 160px 90px",gap:10,alignItems:"center",padding:"11px 20px",borderBottom:isLast?"none":"1px solid #EEF2F7",position:"relative",transition:"background 0.15s"}}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(108,99,255,0.04)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:tpc?.border||"#A0AEC0",borderRadius:2}}/>
              <div style={{paddingLeft:8}}>{task.part?<span style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:tpc?.bg||"#CBD5E0",color:tpc?.text||"#4A5568",border:`1px solid ${tpc?.border||"#A0AEC0"}`,fontWeight:700}}>{task.part}</span>:<span style={{fontSize:10,color:"#A0AEC0"}}>—</span>}</div>
              <p title={task.title} onClick={e=>{e.currentTarget.style.whiteSpace=e.currentTarget.style.whiteSpace==="normal"?"nowrap":"normal";e.currentTarget.style.overflow=e.currentTarget.style.overflow==="visible"?"hidden":"visible";}} style={{margin:0,fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",cursor:"pointer",userSelect:"none"}}>{task.title}</p>
              <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0}}>

              </div>

              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{flex:1,height:5,background:"#CBD5E0",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${task.progress}%`,background:sc.border,borderRadius:3,transition:"width 0.4s"}}/></div>
                <span style={{fontSize:10,color:sc.border,fontWeight:700,flexShrink:0}}>{task.progress}%</span>
              </div>
              <select value={task.status} onChange={e=>onStatusChange(task.id,e.target.value)}
                style={{fontSize:11,padding:"4px 8px",borderRadius:8,border:`1px solid ${sc.border}`,background:sc.bg,color:sc.text,fontWeight:700,cursor:"pointer",outline:"none"}}>
                {TASK_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                <button onClick={()=>onEdit(task)} style={{...btn("#CBD5E0","#6C63FF"),fontSize:11,padding:"4px 8px"}}>수정</button>
                <button onClick={()=>onDelete(task.id)} style={{...btn("#CBD5E0","#F87171"),fontSize:11,padding:"4px 8px"}}>삭제</button>
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>
  </div>;
}

// ── 캘린더 ────────────────────────────────────────────
function CalendarView({schedules,currentMonth,setCurrentMonth,todayStr,selectedSched,setSelectedSched,onDateClick,onEditSched,onDeleteSched,showOwner=false,showPartColor=false,showOwnerColor=false,isMobile=false}){
  const year=currentMonth.getFullYear(),month=currentMonth.getMonth();
  const days=new Date(year,month+1,0).getDate();
  const firstDay=new Date(year,month,1).getDay();
  const pad=n=>String(n).padStart(2,"0");
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=days;d++)cells.push(d);
  // 시간순 정렬
  const getDay=ds=>[...schedules.filter(s=>s.start_date<=ds&&s.end_date>=ds)]
    .sort((a,b)=>(a.start_time||"00:00").localeCompare(b.start_time||"00:00"));
  const todayFull=getLocalDateStr(new Date());
  const [expandedDay,setExpandedDay]=useState(null);
  // 뱃지 색 팔레트
  const PART_LIGHT=[
    {bg:"#EDE9FE",text:"#4338CA"},{bg:"#DBEAFE",text:"#1D4ED8"},
    {bg:"#FAE8FF",text:"#7E22CE"},{bg:"#FEF2F2",text:"#DC2626"},
    {bg:"#DCFCE7",text:"#15803D"},{bg:"#FFF7ED",text:"#C2410C"},
    {bg:"#FEF3C7",text:"#92400E"},{bg:"#F0FDF4",text:"#166534"},
  ];
  function getOwnerLight(name){let h=0;for(let c of(name||"?"))h=(h*31+c.charCodeAt(0))%PART_LIGHT.length;return PART_LIGHT[h];}
  function getBadgeColor(s){
    if(showPartColor){const pc=PART_COLORS[s.part]||{bg:"#F1F5F9",text:"#475569",border:"#CBD5E0"};return{bg:pc.bg,text:pc.text,border:pc.border};}
    if(showOwnerColor){const oc=getOwnerLight(s.owner_name);return{bg:oc.bg,text:oc.text,border:"transparent"};}
    const pc=PRIORITY_COLORS[s.priority]||PRIORITY_COLORS.medium;
    return{bg:pc.bg,text:pc.text,border:pc.border};
  }
  // 일정 상세 팝업 (모달)
  const SchedPopup=({s})=>{
    const pc=getBadgeColor(s);
    const prLabel=s.priority==="high"?"높음":s.priority==="medium"?"중간":"낮음";
    return <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16}} onClick={()=>setSelectedSched(null)}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:480,boxShadow:"0 8px 40px rgba(0,0,0,0.18)",overflow:"hidden"}}>
        {/* 헤더 컬러바 */}
        <div style={{height:5,background:`linear-gradient(90deg,${pc.border||pc.bg},${pc.bg})`}}/>
        <div style={{padding:"22px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
            <div style={{flex:1,paddingRight:12}}>
              <p style={{margin:"0 0 4px",fontSize:11,color:"#A0AEC0",fontWeight:600}}>일정 제목</p>
              <h3 style={{margin:0,fontSize:18,fontWeight:800,color:"#1A1A2E",lineHeight:1.3}}>{s.title}</h3>
            </div>
            <button onClick={()=>setSelectedSched(null)} style={{background:"none",border:"none",fontSize:24,color:"#A0AEC0",cursor:"pointer",lineHeight:1,flexShrink:0}}>×</button>
          </div>
          {s.description&&<p style={{margin:"0 0 16px",fontSize:13,color:"#4A5568",background:"#F8FAFC",borderRadius:8,padding:"10px 12px",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{s.description}</p>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
            {[
              {label:"담당자",value:s.owner_name,color:"#6C63FF"},
              {label:"중요도",value:prLabel,color:pc.text},
              {label:"시작",value:`${s.start_date}${s.start_time?" "+s.start_time:""}`,color:"#2D3748"},
              {label:"종료",value:`${s.end_date}${s.end_time?" "+s.end_time:""}`,color:"#2D3748"},
              ...(showPartColor&&s.part?[{label:"파트",value:s.part,color:pc.text}]:[]),
            ].map(({label,value,color})=><div key={label} style={{background:"#F8FAFC",borderRadius:8,padding:"10px 12px"}}>
              <p style={{margin:"0 0 3px",fontSize:10,color:"#A0AEC0",fontWeight:600}}>{label}</p>
              <p style={{margin:0,fontSize:13,fontWeight:700,color}}>{value||"-"}</p>
            </div>)}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>{onEditSched(s);setSelectedSched(null);}} style={{...btn("#6C63FF"),fontSize:13,padding:"8px 20px"}}>✏️ 수정</button>
            <button onClick={()=>{onDeleteSched(s.id);setSelectedSched(null);}} style={{...btn("#FFF5F5","#F87171"),border:"1px solid #FCA5A5",fontSize:13,padding:"8px 20px"}}>🗑 삭제</button>
          </div>
        </div>
      </div>
    </div>;
  };
  return <div>
    <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
      <button onClick={()=>setCurrentMonth(new Date(year,month-1,1))} style={btn("#EEF2F7","#6C63FF")}>◀</button>
      <h2 style={{margin:0,fontSize:18,fontWeight:800}}>{year}년 {month+1}월</h2>
      <button onClick={()=>setCurrentMonth(new Date(year,month+1,1))} style={btn("#EEF2F7","#6C63FF")}>▶</button>
      <button onClick={()=>setCurrentMonth(new Date())} style={{...btn("#6C63FF"),marginLeft:8}}>오늘</button>
    </div>
    <div style={{background:"#FFFFFF",borderRadius:14,border:"1px solid #CBD5E0",overflowX:"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(80px,1fr))",borderBottom:"1px solid #EEF2F7",minWidth:isMobile?336:560}}>
        {["일","월","화","수","목","금","토"].map((d,i)=><div key={d} className="cal-header-label" style={{padding:isMobile?"6px 0":"12px 0",textAlign:"center",fontSize:isMobile?11:12,fontWeight:700,color:i===0?"#F87171":i===6?"#60A5FA":"#4A5568"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(80px,1fr))",minWidth:isMobile?336:560}}>
        {cells.map((day,idx)=>{
          if(!day)return <div key={`e${idx}`} style={{minHeight:isMobile?50:90,borderRight:"1px solid #CBD5E0",borderBottom:"1px solid #EEF2F7"}}/>;
          const ds=`${year}-${pad(month+1)}-${pad(day)}`;
          const daySch=getDay(ds);
          const isToday=ds===todayFull;
          const holiday=getHoliday(ds);
          const isSun=idx%7===0; const isSat=idx%7===6;
          const col=(isSun||holiday)?"#F87171":isSat?"#60A5FA":"#2D3748";
          return <div key={day} className="cal-day" onClick={()=>onDateClick(ds)}
            style={{minHeight:isMobile?60:90,minWidth:isMobile?48:undefined,padding:isMobile?"3px 2px":"8px 6px",borderRight:"1px solid #CBD5E0",borderBottom:"1px solid #EEF2F7",background:isToday?"#EDE9FE":holiday?"#FFF5F5":"transparent",cursor:"pointer",transition:"background 0.15s",position:"relative",overflow:"visible",zIndex:expandedDay===ds?10:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
              <span style={{width:isMobile?20:26,height:isMobile?20:26,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%",background:isToday?"#6C63FF":"transparent",fontSize:isMobile?11:13,fontWeight:isToday?800:400,color:isToday?"#fff":col,flexShrink:0}}>{day}</span>
              {!isMobile&&<span className="add-btn" style={{fontSize:16,color:"#6C63FF",fontWeight:700,lineHeight:1,paddingRight:2}}>+</span>}
            </div>
            {!isMobile&&holiday&&<div style={{fontSize:9,color:"#F87171",fontWeight:600,marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingLeft:2}}>{holiday}</div>}
            <div style={{display:"flex",flexDirection:"column",gap:1}}>
              {(()=>{
                const isExp=expandedDay===ds;
                const limit=isMobile?2:4;
                const visible=isExp?daySch:daySch.slice(0,limit);
                return <>
                  {visible.map(s=>{
                    const{bg:badgeBg,text:badgeText,border:badgeBorder}=getBadgeColor(s);
                    return <div key={s.id} onClick={e=>{e.stopPropagation();setSelectedSched(s);}}
                      style={{fontSize:isMobile?9:11,fontWeight:700,padding:isMobile?"1px 3px":"3px 7px",borderRadius:isMobile?3:5,background:badgeBg,color:badgeText,border:`1px solid ${badgeBorder||"transparent"}`,cursor:"pointer",lineHeight:"1.4",marginBottom:1}}>
                      <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.title}</div>
                      {!isMobile&&(showOwner||showOwnerColor)&&s.owner_name&&<div style={{fontSize:10,opacity:0.85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>👤 {s.owner_name}</div>}
                      {!isMobile&&showPartColor&&s.part&&<div style={{fontSize:9,opacity:0.85,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginTop:1}}>🏷 {s.part}</div>}
                    </div>;
                  })}
                  {daySch.length>limit&&<div onClick={e=>{e.stopPropagation();setExpandedDay(isExp?null:ds);}} style={{fontSize:isMobile?8:11,color:"#6C63FF",paddingLeft:2,cursor:"pointer",fontWeight:700,userSelect:"none",marginTop:1}}>{isExp?"▲ 접기":`+${daySch.length-limit} 더보기`}</div>}
                </>;
              })()}
            </div>
          </div>;
        })}
      </div>
    </div>
    {selectedSched&&<SchedPopup s={selectedSched}/>}
  </div>;
}

// ── 현장 조직도 편집기 ────────────────────────────────
const ORG_GROUPS=[
  {label:"현장소장",color:"#6C63FF"},{label:"공사",color:"#3B82F6"},
  {label:"공무",color:"#0EA5E9"},{label:"기계",color:"#F59E0B"},
  {label:"전기",color:"#EAB308"},{label:"안전",color:"#22C55E"},
  {label:"품질",color:"#EC4899"},{label:"관리",color:"#F97316"},
  {label:"토목",color:"#10B981"},{label:"기타",color:"#94A3B8"},
];
// 직종 → 직군 자동 매핑
const JOB_TYPE_MAP={"건축":"공사","기계":"기계","전기":"전기","안전":"안전","품질":"품질","관리":"관리","토목":"토목"};
function mapJobTypeToRoleGroup(jobType,position){
  if(position==="현장소장")return "현장소장";
  return JOB_TYPE_MAP[jobType]||"기타";
}
// 직위 정렬 순서
const POSITION_SORT=["전무","전문임원(사장)","전문임원(전무)","상무","상무보","부장","부장대우","차장","차장대우","과장","대리","사원","주임","반장"];
function positionSortKey(pos){const i=POSITION_SORT.indexOf(pos);return i===-1?99:i;}
function getGroupColor(g){return(ORG_GROUPS.find(x=>x.label===g)||{color:"#94A3B8"}).color;}

// 인원 로우데이터 관리 모달
function PersonnelMgrModal({personnel,onSave,onDelete,onClose}){
  const JOB_TYPES=["건축","기계","전기","안전","품질","관리","토목","기타"];
  const DEPT_TYPES=["본사","현장"];
  const EMP_TYPES=["정규직","비정규직"];
  const emptyF={id:"",emp_id:"",name:"",department:"",dept_type:"현장",emp_type:"정규직",position:"",rank:"",job_type:"건축",hire_date:"",age:"",phone:"",license:"",leave_status:"",leave_start:"",leave_end:""};
  const [form,setForm]=useState(emptyF);
  const [editing,setEditing]=useState(null);
  const [search,setSearch]=useState("");
  const sf=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  function startEdit(p){setEditing(p.id);setForm({emp_id:p.emp_id||"",name:p.name||"",department:p.department||"",dept_type:p.dept_type||"현장",emp_type:p.emp_type||"정규직",position:p.position||"",rank:p.rank||"",job_type:p.job_type||"건축",hire_date:p.hire_date||"",age:p.age||"",phone:p.phone||"",license:p.license||"",leave_status:p.leave_status||"",leave_start:p.leave_start||"",leave_end:p.leave_end||""});}
  function reset(){setEditing(null);setForm(emptyF);}
  function save(){
    if(!form.name.trim()){alert("성명을 입력하세요.");return;}
    const row={...form,id:editing||`per${Date.now()}`};
    onSave(row); reset();
  }
  const inpS={width:"100%",border:"1px solid #CBD5E0",borderRadius:7,padding:"7px 10px",fontSize:13,color:"#2D3748",outline:"none",boxSizing:"border-box",background:"#fff"};
  const filtered=personnel.filter(p=>!search||p.name?.includes(search)||p.emp_id?.includes(search)||p.department?.includes(search)||p.job_type?.includes(search)||(p.license||'').includes(search)||(p.leave_status||'').includes(search));
  return <div style={{position:"fixed",inset:0,background:"rgba(30,30,60,0.55)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:900,maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(0,0,0,0.2)",overflow:"hidden"}}>
      <div style={{padding:"16px 22px",borderBottom:"1px solid #E2E8F0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <h3 style={{margin:0,fontSize:16,fontWeight:800,color:"#1A1A2E"}}>👤 인원 로우데이터 관리</h3>

          <div><label style={{fontSize:10,fontWeight:700,color:"#4A5568",display:"block",marginBottom:3}}>전화번호</label><input value={form.phone} onChange={sf("phone")} placeholder="010-0000-0000" style={inpS}/></div>
          <div style={{gridColumn:"1/-1"}}><label style={{fontSize:10,fontWeight:700,color:"#4A5568",display:"block",marginBottom:3}}>자격증</label><input value={form.license||""} onChange={sf("license")} placeholder="건축기사, 토목기사 등 (복수 입력 가능)" style={inpS}/></div>
          <div><label style={{fontSize:10,fontWeight:700,color:"#4A5568",display:"block",marginBottom:3}}>기타인원 구분</label><input value={form.leave_status||""} onChange={sf("leave_status")} placeholder="육아휴직, 파견 등 (해당자만 입력)" style={inpS}/></div>
          <div><label style={{fontSize:10,fontWeight:700,color:"#4A5568",display:"block",marginBottom:3}}>시작일</label><input type="date" value={form.leave_start||""} onChange={sf("leave_start")} style={inpS}/></div>
          <div><label style={{fontSize:10,fontWeight:700,color:"#4A5568",display:"block",marginBottom:3}}>종료일</label><input type="date" value={form.leave_end||""} onChange={sf("leave_end")} style={inpS}/></div>
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
          {editing&&<button onClick={reset} style={{background:"#F7FAFC",border:"1px solid #CBD5E0",borderRadius:7,padding:"7px 14px",fontSize:12,color:"#718096",cursor:"pointer",fontWeight:600}}>취소</button>}
          <button onClick={save} style={{background:"#6C63FF",border:"none",borderRadius:7,padding:"7px 18px",fontSize:12,color:"#fff",cursor:"pointer",fontWeight:700}}>{editing?"수정 저장":"추가"}</button>
        </div>

        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 사번, 성명, 부서, 직종 검색..."
          style={{flex:1,border:"1px solid #CBD5E0",borderRadius:8,padding:"7px 12px",fontSize:13,color:"#2D3748",outline:"none"}}/>
        {search&&<button onClick={()=>setSearch("")} style={{background:"none",border:"none",color:"#A0AEC0",cursor:"pointer",fontSize:18}}>×</button>}
        <span style={{fontSize:12,color:"#718096",whiteSpace:"nowrap"}}>{filtered.length}명</span>

        {["사번","성명","부서명","부서구분","사원구분","직위","직급","직종","입사일","나이","전화번호","자격증","기타인원구분","시작일","종료일",""].map((h,i)=><span key={i} style={{fontSize:10,fontWeight:700,color:"#718096"}}>{h}</span>)}
